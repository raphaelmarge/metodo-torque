<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resumo Gerencial — Método Torque</title>
<link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml">
<link href="../assets/fonts/archivo.css" rel="stylesheet">
<link href="apps.css" rel="stylesheet">
<style>
  .colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  @media (max-width: 800px) { .colunas { grid-template-columns: 1fr; } }
  .bloco { border: 1px solid var(--linha); background: #fff; margin-bottom: 14px; }
  .bloco h3 {
    margin: 0; padding: 10px 14px; background: var(--fundo); border-bottom: 1px solid var(--linha);
    font-size: 12px; font-weight: 700; letter-spacing: .12em; color: var(--cinza);
  }
  .bloco .corpo-bloco { padding: 8px 14px 12px; }
  .kv { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--fundo); font-size: 13.5px; }
  .kv:last-child { border-bottom: none; }
  .kv strong { font-variant-numeric: tabular-nums; }
  .kv .sub-rotulo { font-weight: 700; color: var(--roxo); }
  .verde { color: var(--ok); } .vermelho { color: var(--erro); }
  @media print {
    .topo, .no-print { display: none !important; }
    body { background: #fff; }
    .corpo { padding: 0; max-width: none; }
  }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <img id="logoCliente" class="logo-cliente" alt="Logo da academia" hidden>
    <div>
    <span class="kicker">PROGRAMA · GERENCIAL</span>
    <h1>Resumo Gerencial</h1>
    </div>
  </div>
  <p>O fechamento do mês numa página só, como no EVO: contas, status da base, movimentação, acessos por horário e os números que decidem o negócio.</p>
</header>

<main class="corpo">
  <div class="card linha-flex no-print" style="justify-content: space-between; margin-bottom: 16px;">
    <div class="linha-flex">
      <label style="margin: 0;">Selecione o mês</label>
      <select id="selMes" style="width: auto;"></select>
    </div>
    <button class="btn sec" onclick="window.print()">🖨 Imprimir</button>
  </div>

  <div style="text-align: center; margin-bottom: 12px;" class="only-print">
    <strong id="tituloRel"></strong>
  </div>

  <div class="colunas">
    <div>
      <div class="bloco"><h3>CONTAS</h3><div class="corpo-bloco" id="bContas"></div></div>
      <div class="bloco"><h3>ACESSO DE CLIENTES</h3><div class="corpo-bloco" id="bAcessos"></div></div>
      <div class="bloco"><h3>VENDAS DE CONTRATOS</h3><div class="corpo-bloco" id="bVendas"></div></div>
    </div>
    <div>
      <div class="bloco"><h3>STATUS</h3><div class="corpo-bloco" id="bStatus"></div></div>
      <div class="bloco"><h3>MOVIMENTAÇÃO</h3><div class="corpo-bloco" id="bMov"></div></div>
      <div class="bloco"><h3>INDICADORES</h3><div class="corpo-bloco" id="bInd"></div></div>
    </div>
  </div>
</main>

<script src="../assets/access-config.js"></script>
<script src="../assets/cloud-config.js"></script>
<script src="../assets/vendor/supabase.js"></script>
<script src="store.js"></script>
<script>
(function () {
  "use strict";
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { return String(s == null ? "" : s).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }
  function kv(rot, val, cls) { return '<div class="kv"><span>' + rot + '</span><strong class="' + (cls || "") + '">' + val + "</strong></div>"; }

  var mes = S.monthKey(new Date());

  function meses12() {
    var arr = [], d = new Date();
    for (var i = 0; i < 12; i++) {
      var m = new Date(d.getFullYear(), d.getMonth() - i, 1);
      arr.push({ chave: S.monthKey(m), rotulo: m.toLocaleDateString("pt-BR", { month: "long", year: "numeric" }) });
    }
    return arr;
  }

  function render() {
    var alunosSt = S.read("alunos", { alunos: [], planos: [], recebiveis: [] });
    var contasSt = S.read("contas", { contas: [] });
    var exper = S.read("exper", { aulas: [] }).aulas;
    var hoje = S.todayISO();

    $("tituloRel").textContent = "Resumo Gerencial — " + (meses12().find(function (m) { return m.chave === mes; }) || {}).rotulo;

    // ---------- CONTAS ----------
    var ctsMes = contasSt.contas.filter(function (c) { return (c.vencimento || "").slice(0, 7) === mes && c.status !== "cancelado"; });
    var pagas = ctsMes.filter(function (c) { return c.status === "pago"; }).reduce(function (t, c) { return t + +c.valor; }, 0);
    var vencidasC = ctsMes.filter(function (c) { return c.status === "aberto" && c.vencimento < hoje; }).reduce(function (t, c) { return t + +c.valor; }, 0);
    var recMes = alunosSt.recebiveis.filter(function (r) { return r.competencia === mes; });
    var vendido = recMes.reduce(function (t, r) { return t + +r.valor; }, 0);
    var recebido = alunosSt.recebiveis.filter(function (r) { return r.status === "pago" && (r.pagoEm || "").slice(0, 7) === mes; })
      .reduce(function (t, r) { return t + +r.valor; }, 0);
    var vencidoR = recMes.filter(function (r) { return r.status === "aberto" && r.vencimento < hoje; }).reduce(function (t, r) { return t + +r.valor; }, 0);
    $("bContas").innerHTML =
      kv("<span class='sub-rotulo'>Contas a pagar</span>", "") +
      kv("Pagas", S.fmtBRL(pagas)) +
      kv("Vencidas", S.fmtBRL(vencidasC), vencidasC ? "vermelho" : "") +
      kv("<span class='sub-rotulo'>Contas a receber</span>", "") +
      kv("Previsto (competência)", S.fmtBRL(vendido)) +
      kv("Recebido", S.fmtBRL(recebido), "verde") +
      kv("Vencido", S.fmtBRL(vencidoR), vencidoR ? "vermelho" : "") +
      kv("Saldo (recebido − pago)", S.fmtBRL(recebido - pagas), recebido - pagas >= 0 ? "verde" : "vermelho");

    // ---------- STATUS ----------
    var ativos = 0, suspensos = 0, inativos = 0, especiais = 0;
    var planosG = alunosSt.planos || [];
    var espIdG = {}; planosG.forEach(function (p) { if (p.especial) espIdG[p.id] = true; });
    alunosSt.alunos.forEach(function (a) {
      if (a.status === "inativo") { inativos++; return; }
      var c = (a.contratos || []).find(function (x) { return (x.status === "ativo" || x.status === "congelado") && !x.principalId; });
      if (!c) { inativos++; return; }
      // contrato especial/VIP não conta como ativo (regra do EVO)
      if (espIdG[c.planoId]) { especiais++; return; }
      ativos++;
      if (c.status === "congelado") suspensos++;
    });
    var visitas = exper.filter(function (a) { return (a.data || "").slice(0, 7) === mes && (a.status === "compareceu" || a.status === "matriculado"); }).length;
    $("bStatus").innerHTML =
      kv("Visitas no mês", visitas) +
      kv("Clientes ativos", ativos, "verde") +
      kv("Clientes inativos / sem contrato", inativos) +
      kv("Clientes suspensos", suspensos) +
      (especiais ? kv("Contratos especiais / VIP (fora dos ativos)", especiais) : "");

    // ---------- MOVIMENTAÇÃO ----------
    var conversoes = exper.filter(function (a) { return (a.data || "").slice(0, 7) === mes && a.status === "matriculado"; }).length;
    var suspensoesMes = 0, cancelamentosMes = 0, novosContratos = 0, renovacoes = 0;
    alunosSt.alunos.forEach(function (a) {
      var cs = (a.contratos || []).slice().sort(function (x, y) { return (x.inicio || "") < (y.inicio || "") ? -1 : 1; });
      cs.forEach(function (c, i) {
        if ((c.congeladoEm || "").slice(0, 7) === mes) suspensoesMes++;
        if ((c.canceladoEm || "").slice(0, 7) === mes) cancelamentosMes++;
        if ((c.inicio || "").slice(0, 7) === mes) {
          novosContratos++;
          if (i > 0) renovacoes++;
        }
      });
    });
    $("bMov").innerHTML =
      kv("Conversões (experimental → matrícula)", conversoes, "verde") +
      kv("Contratos novos no mês", novosContratos) +
      kv("Renovações / rematrículas", renovacoes) +
      kv("Suspensões", suspensoesMes) +
      kv("Cancelamentos", cancelamentosMes, cancelamentosMes ? "vermelho" : "");

    // ---------- ACESSOS por faixa ----------
    var faixas = [[0, 5, "00:00 às 04:59"], [5, 12, "5:00 às 11:59"], [12, 17, "12:00 às 16:59"], [17, 22, "17:00 às 21:59"], [22, 24, "22:00 às 23:59"]];
    var cont = [0, 0, 0, 0, 0], total = 0, dias = {};
    alunosSt.alunos.forEach(function (a) {
      (a.checkins || []).forEach(function (t) {
        if ((t || "").slice(0, 7) !== mes) return;
        total++;
        dias[t.slice(0, 10)] = 1;
        var h = new Date(t).getHours();
        faixas.forEach(function (f, i) { if (h >= f[0] && h < f[1]) cont[i]++; });
      });
    });
    var nDias = Object.keys(dias).length;
    $("bAcessos").innerHTML =
      faixas.map(function (f, i) { return kv(f[2], cont[i]); }).join("") +
      kv("Acesso por dia (média)", nDias ? (total / nDias).toFixed(1).replace(".", ",") : 0) +
      kv("Total de dias com acesso", nDias) +
      kv("Total de acessos", total, "verde");

    // ---------- VENDAS DE CONTRATOS (ranking de planos) ----------
    var porPlano = {};
    alunosSt.alunos.forEach(function (a) {
      (a.contratos || []).forEach(function (c) {
        if ((c.inicio || "").slice(0, 7) !== mes) return;
        var plano = alunosSt.planos.find(function (p) { return p.id === c.planoId; });
        var nome = plano ? plano.nome : "Sem plano";
        porPlano[nome] = (porPlano[nome] || 0) + 1;
      });
    });
    var ranking = Object.keys(porPlano).map(function (n) { return { nome: n, qtd: porPlano[n] }; })
      .sort(function (a, b) { return b.qtd - a.qtd; }).slice(0, 5);
    $("bVendas").innerHTML = ranking.length
      ? ranking.map(function (r, i) { return kv((i + 1) + "º — " + esc(r.nome), r.qtd + " vendido(s)"); }).join("")
      : '<div class="muted" style="padding: 8px 0;">Nenhum contrato vendido neste mês.</div>';

    // ---------- INDICADORES ----------
    var recValidos = recMes.filter(function (r) { return +r.valor > 0; });
    var ticket = recValidos.length ? recValidos.reduce(function (t, r) { return t + +r.valor; }, 0) / recValidos.length : 0;
    var gastoMes = contasSt.contas.filter(function (c) { return c.status === "pago" && (c.pagoEm || "").slice(0, 7) === mes; })
      .reduce(function (t, c) { return t + +c.valor; }, 0);
    var custoCliente = ativos ? gastoMes / ativos : 0;
    var vendidosMes = [];
    alunosSt.alunos.forEach(function (a) {
      (a.contratos || []).forEach(function (c) {
        if ((c.inicio || "").slice(0, 7) === mes && +c.valor > 0) vendidosMes.push(+c.valor);
      });
    });
    var mensalMedia = vendidosMes.length ? vendidosMes.reduce(function (t, v) { return t + v; }, 0) / vendidosMes.length : 0;
    // ICV1 (conversão na 1ª visita) / ICV2 (a partir da 2ª visita) — do Funil
    var funil = S.read("funil", { leads: [] });
    var oportsMes = funil.leads.filter(function (l) { return (l.criado || "").slice(0, 7) === mes || (l.visitouEm || "").slice(0, 7) === mes; });
    var convMes = funil.leads.filter(function (l) { return (l.matriculouEm || "").slice(0, 7) === mes; });
    var conv1 = convMes.filter(function (l) { return l.visitouEm && l.matriculouEm && l.matriculouEm === l.visitouEm; }).length;
    var conv2 = convMes.length - conv1;
    var baseOp = oportsMes.length || funil.leads.length || 1;
    var icv1 = Math.round(conv1 / baseOp * 1000) / 10;
    var icv2 = Math.round(conv2 / baseOp * 1000) / 10;
    // Cliente por m² — usa a metragem configurada (Configurações), senão mostra dica
    var metragem = +(S.read("config", { dados: {} }).dados || {}).metragem || 0;
    $("bInd").innerHTML =
      kv("ICV1 (conversão na 1ª visita)", String(icv1).replace(".", ",") + "%") +
      kv("ICV2 (a partir da 2ª visita)", String(icv2).replace(".", ",") + "%") +
      kv("Cliente por m²", metragem ? (Math.round(ativos / metragem * 100) / 100).toString().replace(".", ",") : "defina a metragem") +
      kv("Ticket médio", S.fmtBRL(ticket)) +
      kv("Custo por cliente", S.fmtBRL(custoCliente)) +
      kv("Mensalidade média dos contratos vendidos", S.fmtBRL(mensalMedia)) +
      kv("Resultado do mês (recebido − gastos)", S.fmtBRL(recebido - gastoMes), recebido - gastoMes >= 0 ? "verde" : "vermelho") +
      kv("Churn do mês", (ativos + cancelamentosMes ? (cancelamentosMes / (ativos + cancelamentosMes) * 100) : 0).toFixed(1).replace(".", ",") + "%");
  }

  $("selMes").innerHTML = meses12().map(function (m) {
    return '<option value="' + m.chave + '">' + m.rotulo + "</option>";
  }).join("");
  $("selMes").addEventListener("change", function () { mes = this.value; render(); });

  S.onChange(function () { render(); });
  render();
})();
</script>
<script>
(function () {
  var S = window.MTStore;
  function brl(v) { return (v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" }); }

  window.fechamentoPDF = function () {
    var hoje = S.todayISO();
    var mes = hoje.slice(0, 7);
    var stA = S.read("alunos", { alunos: [], recebiveis: [] });
    var ativos = stA.alunos.filter(function (a) { return a.status !== "inativo"; });
    var receita = 0, emAtraso = 0, atrasoN = 0;
    stA.recebiveis.forEach(function (r) {
      if (r.status === "pago" && (r.pagoEm || r.vencimento || "").slice(0, 7) === mes) receita += +r.valor || 0;
      if (r.status === "aberto" && r.vencimento < hoje) { emAtraso += +r.valor || 0; atrasoN++; }
    });
    var novos = 0, cancelados = 0, ck = 0;
    ativos.forEach(function (a) { ck += (a.checkins || []).filter(function (t) { return (t || "").slice(0, 7) === mes; }).length; });
    stA.alunos.forEach(function (a) {
      (a.contratos || []).forEach(function (c) {
        if ((c.inicio || "").slice(0, 7) === mes) novos++;
        if ((c.canceladoEm || "").slice(0, 7) === mes) cancelados++;
      });
    });
    var vendasProd = 0;
    (S.read("produtos", { vendas: [] }).vendas || []).forEach(function (v) {
      if (((v.data || v.quando || "")).slice(0, 7) === mes) vendasProd += +v.total || 0;
    });
    var churn = ativos.length ? Math.round(cancelados * 1000 / ativos.length) / 10 : 0;
    var nomeAcad = (S.read("config", { dados: {} }).dados || {}).nome || "TORQUE FIT";
    var w = window.open("", "_blank");
    w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><title>Fechamento " + mes + "</title>" +
      "<style>body{font-family:system-ui,sans-serif;max-width:700px;margin:40px auto;color:#1a1a2e;}" +
      "h1{border-bottom:3px solid #7c3aed;padding-bottom:8px;}h1 small{color:#7c3aed;display:block;font-size:14px;}" +
      ".grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;}" +
      ".kpi{border:1px solid #ddd;border-radius:10px;padding:16px;}" +
      ".kpi .r{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.08em;}" +
      ".kpi .v{font-size:26px;font-weight:800;margin-top:4px;}" +
      "footer{margin-top:30px;font-size:11px;color:#999;text-align:center;}@media print{body{margin:10mm;}}</style></head><body>" +
      "<h1>" + nomeAcad + "<small>Fechamento do mês · " + mes.split("-").reverse().join("/") + "</small></h1>" +
      "<div class='grid'>" +
      "<div class='kpi'><div class='r'>Receita de mensalidades</div><div class='v'>" + brl(receita) + "</div></div>" +
      "<div class='kpi'><div class='r'>Vendas de produtos</div><div class='v'>" + brl(vendasProd) + "</div></div>" +
      "<div class='kpi'><div class='r'>Alunos ativos</div><div class='v'>" + ativos.length + "</div></div>" +
      "<div class='kpi'><div class='r'>Check-ins no mês</div><div class='v'>" + ck + "</div></div>" +
      "<div class='kpi'><div class='r'>Novos contratos</div><div class='v'>" + novos + "</div></div>" +
      "<div class='kpi'><div class='r'>Cancelamentos (churn " + churn + "%)</div><div class='v'>" + cancelados + "</div></div>" +
      "<div class='kpi'><div class='r'>Inadimplência hoje</div><div class='v'>" + brl(emAtraso) + " <small style='font-size:13px'>(" + atrasoN + ")</small></div></div>" +
      "<div class='kpi'><div class='r'>Receita por aluno</div><div class='v'>" + brl(ativos.length ? receita / ativos.length : 0) + "</div></div>" +
      "</div><footer>Gerado pelo TORQUESYS em " + new Date().toLocaleString("pt-BR") + " — imprima ou salve como PDF (Ctrl+P)</footer>" +
      "<scr" + "ipt>window.print();</scr" + "ipt></body></html>");
    w.document.close();
  };

  var barra = document.querySelector("main .card") || document.querySelector("main");
  var btn = document.createElement("button");
  btn.className = "btn";
  btn.id = "btnPDF";
  btn.textContent = "📄 Fechamento do mês (PDF)";
  btn.style.margin = "10px 0";
  btn.onclick = window.fechamentoPDF;
  barra.parentNode.insertBefore(btn, barra);
})();
</script>
</body>
</html>
