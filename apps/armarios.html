<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Armários — Método Torque</title>
<link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml">
<link href="../assets/fonts/archivo.css" rel="stylesheet">
<link href="apps.css" rel="stylesheet">
<style>
  .mapa { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 10px; }
  .arm {
    border: 1.5px solid var(--linha); background: #fff; padding: 10px 8px; text-align: center;
    cursor: pointer; min-height: 86px; display: flex; flex-direction: column; justify-content: center; gap: 2px;
  }
  .arm:hover { border-color: var(--roxo); }
  .arm .num { font-size: 18px; font-weight: 800; }
  .arm .quem { font-size: 10.5px; color: var(--cinza); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .arm .ate { font-size: 10px; color: var(--cinza-2); }
  .arm.livre { background: var(--fundo); }
  .arm.livre .num { color: var(--cinza-2); }
  .arm.ocupado { border-color: rgba(22,163,74,.5); background: rgba(22,163,74,.05); }
  .arm.ocupado .num { color: var(--ok); }
  .arm.vencido { border-color: rgba(220,38,38,.5); background: rgba(220,38,38,.05); }
  .arm.vencido .num { color: var(--erro); }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .stats .card { text-align: center; padding: 14px; }
  .stats .n { font-size: 26px; font-weight: 800; }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <img id="logoCliente" class="logo-cliente" alt="Logo da academia" hidden>
    <div>
    <span class="kicker">PROGRAMA · ADMINISTRATIVO</span>
    <h1>Locação de Armários</h1>
    </div>
  </div>
  <p>O mapa dos armários da academia: verde alugado, vermelho vencido, cinza livre — renda extra organizada num clique.</p>
</header>

<main class="corpo" style="display: flex; flex-direction: column; gap: 16px;">

  <div class="stats" id="stats"></div>

  <div class="card linha-flex no-print" style="justify-content: space-between;">
    <span class="muted">Toque num armário para alugar, renovar ou liberar.</span>
    <div class="linha-flex">
      <label style="margin: 0; font-size: 13px;">Total de armários</label>
      <input id="cfgTotal" type="number" min="1" style="width: 90px; text-align: right;">
      <label style="margin: 0 0 0 10px; font-size: 13px;">Valor/mês padrão</label>
      <input id="cfgValor" type="number" step="0.5" min="0" style="width: 90px; text-align: right;">
    </div>
  </div>

  <div class="mapa" id="mapa"></div>
</main>

<!-- alugar / detalhes -->
<dialog id="dlgArm">
  <form class="card" method="dialog" style="display: flex; flex-direction: column; gap: 14px; width: 420px; max-width: 100%;">
    <h2 id="armTitulo">Armário</h2>
    <div id="armDetalhe" class="muted" hidden></div>
    <div id="armForm">
      <div class="campo"><label>Aluno *</label><input id="fAluno" list="alunosLista" placeholder="nome"><datalist id="alunosLista"></datalist></div>
      <div class="grid-2" style="margin-top: 10px;">
        <div class="campo"><label>Início</label><input id="fInicio" type="date"></div>
        <div class="campo"><label>Meses</label><input id="fMeses" type="number" min="1" value="1"></div>
      </div>
      <div class="campo" style="margin-top: 10px;"><label>Valor por mês (R$)</label><input id="fValor" type="number" step="0.5" min="0"></div>
    </div>
    <div class="linha-flex" style="justify-content: space-between;">
      <button type="button" class="btn perigo mini" id="btnLiberar" hidden>Liberar armário</button>
      <div class="linha-flex">
        <button class="btn sec" value="cancel" formnovalidate>Fechar</button>
        <button class="btn" value="ok" id="btnConfirmar">Alugar</button>
      </div>
    </div>
  </form>
</dialog>

<script src="../assets/access-config.js"></script>
<script src="../assets/cloud-config.js"></script>
<script src="../assets/vendor/supabase.js"></script>
<script src="store.js"></script>
<script>
(function () {
  "use strict";
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { return String(s == null ? "" : s).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }

  function load() { return S.read("armarios", { total: 20, valorPadrao: 25, locacoes: [] }); }
  function save(st) { S.write("armarios", st); render(); }

  function fimDe(l) {
    var d = new Date(l.inicio + "T12:00");
    d.setMonth(d.getMonth() + (+l.meses || 1));
    return S.todayISO(d);
  }
  function locDe(st, num) { return st.locacoes.find(function (l) { return l.num === num; }) || null; }

  function render() {
    var st = load();
    $("cfgTotal").value = st.total;
    $("cfgValor").value = st.valorPadrao;
    var hoje = S.todayISO();
    var ocupados = 0, vencidos = 0, receita = 0;
    var html = "";
    for (var n = 1; n <= st.total; n++) {
      var l = locDe(st, n);
      var cls = "livre", quem = "livre", ate = "";
      if (l) {
        var fim = fimDe(l);
        var venc = fim < hoje;
        cls = venc ? "vencido" : "ocupado";
        quem = l.aluno;
        ate = (venc ? "venceu " : "até ") + S.fmtData(fim);
        ocupados++;
        if (venc) vencidos++;
        receita += +l.valor || 0;
      }
      html += '<div class="arm ' + cls + '" data-num="' + n + '">' +
        '<span class="num">' + n + '</span><span class="quem">' + esc(quem) + '</span>' +
        (ate ? '<span class="ate">' + ate + "</span>" : "") + "</div>";
    }
    $("mapa").innerHTML = html;
    $("stats").innerHTML =
      '<div class="card"><div class="n">' + st.total + '</div><div class="muted">armários</div></div>' +
      '<div class="card"><div class="n" style="color:var(--ok)">' + ocupados + '</div><div class="muted">alugados</div></div>' +
      '<div class="card"><div class="n" style="color:' + (vencidos ? "var(--erro)" : "var(--cinza-2)") + '">' + vencidos + '</div><div class="muted">vencidos</div></div>' +
      '<div class="card"><div class="n">' + (st.total - ocupados) + '</div><div class="muted">livres</div></div>' +
      '<div class="card"><div class="n" style="color:var(--roxo)">' + S.fmtBRL(receita) + '</div><div class="muted">receita mensal</div></div>';
  }

  $("cfgTotal").addEventListener("change", function () {
    var st = load();
    var novo = Math.max(1, +this.value || st.total);
    var maiorOcupado = st.locacoes.reduce(function (m, l) { return Math.max(m, l.num); }, 0);
    if (novo < maiorOcupado) { alert("Há armário alugado com número maior que " + novo + "."); render(); return; }
    st.total = novo;
    save(st);
  });
  $("cfgValor").addEventListener("change", function () {
    var st = load();
    st.valorPadrao = +this.value || 0;
    save(st);
  });

  var numSel = null;
  $("mapa").addEventListener("click", function (e) {
    var el = e.target.closest("[data-num]");
    if (!el) return;
    numSel = +el.getAttribute("data-num");
    abre();
  });

  function abre() {
    var st = load();
    var l = locDe(st, numSel);
    $("armTitulo").textContent = "Armário " + numSel + (l ? " — " + (fimDe(l) < S.todayISO() ? "VENCIDO" : "alugado") : " — livre");
    $("alunosLista").innerHTML = S.read("alunos", { alunos: [] }).alunos
      .filter(function (a) { return a.status !== "inativo"; })
      .map(function (a) { return "<option>" + esc(a.nome) + "</option>"; }).join("");
    if (l) {
      $("armDetalhe").hidden = false;
      $("armDetalhe").textContent = l.aluno + " · desde " + S.fmtData(l.inicio) + " · " + S.fmtBRL(+l.valor) + "/mês · vence " + S.fmtData(fimDe(l));
      $("fAluno").value = l.aluno;
      $("fInicio").value = fimDe(l) < S.todayISO() ? S.todayISO() : l.inicio;
      $("fMeses").value = l.meses;
      $("fValor").value = l.valor;
      $("btnLiberar").hidden = false;
      $("btnConfirmar").textContent = "Renovar / atualizar";
    } else {
      $("armDetalhe").hidden = true;
      $("fAluno").value = "";
      $("fInicio").value = S.todayISO();
      $("fMeses").value = 1;
      $("fValor").value = st.valorPadrao;
      $("btnLiberar").hidden = true;
      $("btnConfirmar").textContent = "Alugar";
    }
    $("dlgArm").showModal();
  }

  $("dlgArm").querySelector("form").addEventListener("submit", function (e) {
    if (e.submitter && e.submitter.value === "cancel") return;
    var nome = $("fAluno").value.trim();
    if (!nome) { e.preventDefault(); alert("Informe o aluno."); return; }
    var st = load();
    st.locacoes = st.locacoes.filter(function (l) { return l.num !== numSel; });
    st.locacoes.push({
      num: numSel, aluno: nome, inicio: $("fInicio").value || S.todayISO(),
      meses: +$("fMeses").value || 1, valor: +$("fValor").value || 0,
    });
    save(st);
  });
  $("btnLiberar").onclick = function () {
    if (!confirm("Liberar o armário " + numSel + "?")) return;
    var st = load();
    st.locacoes = st.locacoes.filter(function (l) { return l.num !== numSel; });
    $("dlgArm").close();
    save(st);
  };

  S.onChange(function (k) { if (k === "armarios" || k === "alunos") render(); });
  render();
})();
</script>
</body>
</html>
