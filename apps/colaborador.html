<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficha do Colaborador — Método Torque</title>
<link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml">
<link href="../assets/fonts/archivo.css" rel="stylesheet">
<link href="apps.css" rel="stylesheet">
<style>
  .grid-col { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 900px) { .grid-col { display: flex; flex-direction: column; } }
  .painel-esq { text-align: center; }
  .painel-esq .avatar { width: 84px; height: 84px; border-radius: 50%; background: var(--roxo); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; }
  .painel-esq h2 { margin: 10px 0 2px; text-transform: none; letter-spacing: 0; font-size: 18px; color: var(--texto); }
  .painel-esq .sub { color: var(--cinza); font-size: 13px; }
  .bloco-esq { text-align: left; border-top: 1px solid var(--linha); margin-top: 14px; padding-top: 12px; }
  .bloco-esq h3 { font-size: 11.5px; letter-spacing: .1em; color: var(--cinza); margin-bottom: 8px; }
  .kv { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; font-size: 13.5px; }
  .kv span:first-child { color: var(--cinza); }
  .tgl { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13.5px; }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <img id="logoCliente" class="logo-cliente" alt="Logo da academia" hidden>
    <div>
    <span class="kicker">PROGRAMA · ADMINISTRATIVO</span>
    <h1>Ficha do Colaborador</h1>
    </div>
  </div>
  <p>A ficha completa do funcionário, como no EVO: dados, contratação com salário, horário de trabalho, permissões e controle de acesso.</p>
</header>

<main class="corpo" id="corpo"></main>

<script src="../assets/access-config.js"></script>
<script src="../assets/cloud-config.js"></script>
<script src="../assets/vendor/supabase.js"></script>
<script src="store.js"></script>
<script>
(function () {
  "use strict";
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { return String(s == null ? "" : s).replace(/[<>&"]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]; }); }
  function ini(n) { return String(n || "?").split(" ").map(function (p) { return p[0]; }).slice(0, 2).join("").toUpperCase(); }

  function load() { return S.read("equipe", { cargos: [], colaboradores: [] }); }
  var colId = new URLSearchParams(location.search).get("id") || null;
  var aba = "cadastro";
  var DIAS = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];

  function renderSeletor() {
    var lista = load().colaboradores.slice().sort(function (x, y) { return x.nome < y.nome ? -1 : 1; });
    $("corpo").innerHTML = '<div class="card"><div class="campo"><label>Escolha o colaborador</label>' +
      '<input id="busca" placeholder="digite o nome…" autocomplete="off"></div><div id="res" style="margin-top:10px;"></div></div>';
    function res() {
      var q = $("busca").value.trim().toLowerCase();
      $("res").innerHTML = lista.filter(function (c) { return c.nome.toLowerCase().indexOf(q) >= 0; }).slice(0, 12).map(function (c) {
        return '<a class="btn sec" style="display:block; margin-bottom:6px; text-align:left;" href="colaborador.html?id=' + c.id + '">' +
          esc(c.nome) + ' <span class="muted">— ' + esc(c.cargo || "sem cargo") + "</span></a>";
      }).join("") || '<div class="vazio">Ninguém com esse nome. Cadastre em <a href="equipe.html">Colaboradores e Cargos</a>.</div>';
    }
    $("busca").addEventListener("input", res);
    res();
  }

  function salvaCampo(id, campo, transform) {
    var el = $(id);
    if (!el) return;
    el.addEventListener("change", function () {
      var st = load();
      var c = st.colaboradores.find(function (x) { return x.id === colId; });
      var v = transform ? transform(this) : this.value.trim();
      if (c[campo] === v) return;
      c[campo] = v;
      S.write("equipe", st);
    });
  }

  function render() {
    var st = load();
    var c = st.colaboradores.find(function (x) { return x.id === colId; });
    if (!c) { renderSeletor(); return; }
    document.title = c.nome + " — Ficha do Colaborador";
    var h = c.horario || {};

    $("corpo").innerHTML = '<div class="grid-col">' +
      // painel esquerdo (como no EVO)
      '<div class="card painel-esq">' +
      '<div class="avatar">' + esc(ini(c.nome)) + "</div>" +
      "<div style='margin-top:8px;'><span class='tag " + (c.ativo === false ? "neutro" : "ok") + "'>" + (c.ativo === false ? "INATIVO" : "ATIVO") + "</span></div>" +
      "<h2>" + esc(c.nome) + '</h2><div class="sub">' + esc(c.cargo || "sem cargo") + "</div>" +
      '<div class="bloco-esq"><h3>SOBRE O COLABORADOR</h3>' +
      '<div class="tgl"><span>Inativar</span><input type="checkbox" id="tglInativo"' + (c.ativo === false ? " checked" : "") + "></div>" +
      (c.email ? '<div class="kv"><span>E-mail</span><span>' + esc(c.email) + "</span></div>" : "") +
      (c.zap ? '<div class="kv"><span>Celular</span><span>' + esc(c.zap) +
        ' <a class="btn whats mini" style="padding:1px 7px;" target="_blank" rel="noopener" href="https://wa.me/55' + String(c.zap).replace(/\D/g, "") + '">💬</a></span></div>' : "") +
      "</div>" +
      '<div class="bloco-esq"><h3>🔒 PERMITIR ACESSO</h3>' +
      '<div class="tgl"><span>À catraca</span><input type="checkbox" id="tglCatraca"' + (c.acessoCatraca !== false ? " checked" : "") + "></div>" +
      '<div class="tgl"><span>Fora do horário de trabalho</span><input type="checkbox" id="tglFora"' + (c.acessoForaHorario ? " checked" : "") + "></div>" +
      '<div class="tgl"><span>Utiliza teclado para acesso</span><input type="checkbox" id="tglTeclado"' + (c.acessoTeclado ? " checked" : "") + "></div>" +
      '<div class="tgl"><span>Bloquear acesso ao sistema</span><input type="checkbox" id="tglBloqSis"' + (c.bloqueioSistema ? " checked" : "") + "></div>" +
      '<div class="tgl"><span>Exibir na grade de horário</span><input type="checkbox" id="tglGrade"' + (c.exibeGrade !== false ? " checked" : "") + "></div>" +
      "</div></div>" +

      // painel direito com abas
      '<div><div class="abas" style="margin-bottom: 12px;" id="abas">' +
      [["cadastro", "Cadastro"], ["contratacao", "Contratação"], ["horario", "Horário"], ["permissoes", "Permissões"], ["carteira", "Carteira"], ["metas", "Metas"]].map(function (x) {
        return '<button data-ab="' + x[0] + '"' + (aba === x[0] ? ' class="ativa"' : "") + ">" + x[1] + "</button>";
      }).join("") + "</div><div id='painelAba'></div></div></div>";

    // toggles do painel esquerdo
    function tgl(id, campo, invertido) {
      $(id).addEventListener("change", function () {
        var st2 = load();
        var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
        c2[campo] = invertido ? !this.checked : this.checked;
        S.write("equipe", st2);
      });
    }
    tgl("tglInativo", "ativo", true);
    tgl("tglCatraca", "acessoCatraca", false);
    tgl("tglFora", "acessoForaHorario", false);
    tgl("tglTeclado", "acessoTeclado", false);
    tgl("tglBloqSis", "bloqueioSistema", false);
    tgl("tglGrade", "exibeGrade", false);

    var p = "";
    if (aba === "cadastro") {
      p = '<div class="card"><h2>Informações principais</h2><div class="grid-2" style="margin-top: 10px;">' +
        '<div class="campo"><label>Nome *</label><input id="cNome" value="' + esc(c.nome) + '"></div>' +
        '<div class="campo"><label>Gênero</label><select id="cGenero"><option></option><option' + (c.genero === "Masculino" ? " selected" : "") + '>Masculino</option><option' + (c.genero === "Feminino" ? " selected" : "") + '>Feminino</option><option' + (c.genero === "Outro" ? " selected" : "") + ">Outro</option></select></div>" +
        '<div class="campo"><label>E-mail</label><input id="cEmail" value="' + esc(c.email || "") + '"></div>' +
        '<div class="campo"><label>Celular</label><input id="cZap" value="' + esc(c.zap || "") + '"></div>' +
        '<div class="campo"><label>Cargo</label><select id="cCargo">' + st.cargos.map(function (cg) {
          return "<option" + (cg === c.cargo ? " selected" : "") + ">" + esc(cg) + "</option>";
        }).join("") + "</select></div>" +
        '<div class="campo"><label>Admissão</label><input id="cAdmissao" type="date" value="' + esc(c.admissao || "") + '"></div>' +
        '<div class="campo"><label>Endereço</label><input id="cEndereco" value="' + esc(c.endereco || "") + '" placeholder="rua, nº, bairro"></div>' +
        '<div class="campo"><label>CPF</label><input id="cCpf" value="' + esc(c.cpf || "") + '"></div>' +
        '<div class="campo"><label>Nascimento</label><input id="cNasc" type="date" value="' + esc(c.nascimento || "") + '"></div>' +
        '<div class="campo"><label>CREF</label><input id="cCref" value="' + esc(c.cref || "") + '" placeholder="registro profissional"></div>' +
        '<div class="campo"><label>PIS</label><input id="cPis" value="' + esc(c.pis || "") + '"></div>' +
        '<div class="campo"><label>Carteirinha (nº de acesso)</label><input id="cCarteirinha" value="' + esc(c.carteirinha || "") + '"></div>' +
        '<div class="campo"><label>Função</label><select id="cFuncao">' +
        ["", "Professor", "Estagiário", "Recepcionista", "Consultor", "Gerente", "Coordenador", "Outro"].map(function (f) {
          return "<option" + (f === (c.funcao || "") ? " selected" : "") + ">" + f + "</option>";
        }).join("") + "</select></div>" +
        "</div><h2 style='margin-top: 16px;'>Emergência</h2><div class='grid-2' style='margin-top: 10px;'>" +
        '<div class="campo"><label>Contato de emergência</label><input id="cEmgNome" value="' + esc(c.emergenciaNome || "") + '"></div>' +
        '<div class="campo"><label>Telefone</label><input id="cEmgFone" value="' + esc(c.emergenciaFone || "") + '"></div>' +
        "</div><p class='muted' style='margin-top: 10px;'>Os campos salvam sozinhos ao sair deles.</p></div>";
    }
    if (aba === "contratacao") {
      p = '<div class="card"><h2>Salário</h2><div class="linha-flex" style="margin-top: 10px;">' +
        '<div class="campo"><label>Tipo de contratação</label><select id="cTipo">' +
        ["", "CLT", "PJ", "Estágio", "Horista", "Diarista"].map(function (t) {
          return "<option" + (t === (c.tipoContrato || "") ? " selected" : "") + ">" + t + "</option>";
        }).join("") + "</select></div>" +
        '<div class="campo"><label>Salário mensal (R$)</label><input id="cSalario" type="number" step="0.01" min="0" value="' + (+c.salario || "") + '"></div>' +
        '<div class="campo"><label>Valor hora (R$)</label><input id="cValorHora" type="number" step="0.01" min="0" value="' + (+c.valorHora || "") + '"></div>' +
        '<div class="campo"><label>Valor hora dom/feriado (R$)</label><input id="cValorHoraDF" type="number" step="0.01" min="0" value="' + (+c.valorHoraDF || "") + '" title="Domingos e feriados pagam este valor; vazio = usa o valor hora normal"></div>' +
        "</div>" +
        '<p class="muted" id="hintVinculo" style="margin: 6px 0 0;"></p>' +
        '<div class="linha-flex" style="margin-top: 8px;"><button class="btn" id="btnFolha">💲 Lançar salário do mês em Contas a Pagar</button>' +
        '<span class="muted" id="folhaNota">entra no centro "Folha de pagamento", vencimento dia 5 do mês seguinte</span></div>' +
        "<h2 style='margin-top: 18px;'>Informações complementares</h2><div class='grid-2' style='margin-top: 10px;'>" +
        '<div class="campo"><label>Conta bancária / PIX</label><input id="cBanco" value="' + esc(c.banco || "") + '"></div>' +
        '<div class="campo"><label>Observações (benefícios, documentos, exames)</label><input id="cObsC" value="' + esc(c.obsContratacao || "") + '"></div>' +
        "</div></div>";
    }
    if (aba === "horario") {
      p = '<div class="card"><h2>Horário de trabalho</h2><p class="muted" style="margin: 4px 0 10px;">Deixe em branco os dias de folga.</p>' +
        DIAS.map(function (d, i) {
          var hd = h[i] || {};
          return '<div class="linha-flex" style="padding: 4px 0; align-items: center;"><span style="width: 90px; font-size: 13.5px;">' + d + "</span>" +
            '<input type="time" data-h="' + i + '" data-c="de" value="' + esc(hd.de || "") + '" style="width: 110px;"> às ' +
            '<input type="time" data-h="' + i + '" data-c="ate" value="' + esc(hd.ate || "") + '" style="width: 110px;"></div>';
        }).join("") + "</div>";
    }
    if (aba === "permissoes") {
      // perfis vêm da tela Permissões (como no EVO: Acesso Total, Consultor, Coord., Financeiro…)
      var stP = S.read("permissoes", { perfis: null });
      var perfis = (stP.perfis || []).filter(function (x) { return x.ativa !== false; });
      p = '<div class="card"><h2>Permissão</h2><p class="muted" style="margin: 4px 0 10px;">O perfil define as telas que esse colaborador usa. Crie e edite perfis em <a href="permissoes.html">Permissões</a>. (O bloqueio real por login individual entra na Fase 2 — hoje vale como orientação da equipe.)</p>' +
        (perfis.length ? perfis.map(function (pf) {
          var telas = Object.keys(pf.telas || {}).length;
          return '<label class="linha-flex" style="gap: 8px; padding: 7px 0; align-items: flex-start; cursor: pointer;">' +
            '<input type="radio" name="perfil" value="' + pf.id + '"' + (c.permissaoId === pf.id ? " checked" : "") + ">" +
            "<span><strong>" + esc(pf.nome) + (pf.nome === "Acesso Total" ? " 🔑" : "") + "</strong><br><span class='muted' style='font-size: 12.5px;'>" + esc(pf.desc || "") + " · " + telas + " área(s) liberada(s)</span></span></label>";
        }).join("") : '<div class="vazio">Abra a tela <a href="permissoes.html">Permissões</a> uma vez pra criar os perfis padrão.</div>') +
        (c.permissaoId ? '<div class="linha-flex" style="margin-top:8px;"><button class="btn sec mini" id="btnSemPerm">Remover permissão (sem permissão)</button></div>' : "") +
        "</div>";
    }
    if (aba === "carteira") {
      // carteira = alunos ativos atendidos por esse colaborador (campo consultor do aluno)
      var stAl = S.read("alunos", { alunos: [], planos: [], recebiveis: [] });
      var hoje = S.todayISO();
      var meus = stAl.alunos.filter(function (a) {
        return a.status !== "inativo" && (a.consultor || "").trim().toLowerCase() === c.nome.trim().toLowerCase();
      });
      var inadIds = {};
      stAl.recebiveis.forEach(function (r) { if (r.status === "aberto" && r.vencimento < hoje) inadIds[r.alunoId] = 1; });
      var novosMes = meus.filter(function (a) { return (a.desde || "").slice(0, 7) === hoje.slice(0, 7); }).length;
      p = '<div class="card"><div class="linha-flex" style="justify-content: space-between;"><h2>Carteira de clientes</h2>' +
        '<span class="tag roxo">' + meus.length + " ativo(s)</span></div>" +
        '<p class="muted" style="margin: 4px 0 10px; font-size: 13px;">Alunos com ' + esc(c.nome.split(" ")[0]) + " como consultor(a) no cadastro. Novos no mês: " + novosMes + ". Visão geral em <a href='carteiras.html'>Carteiras</a>.</p>" +
        (meus.length ? meus.sort(function (a, b) { return a.nome.localeCompare(b.nome); }).map(function (a) {
          return '<div class="linha-flex" style="gap: 10px; padding: 7px 0; border-top: 1px solid var(--linha); align-items: center;">' +
            '<a href="perfil-aluno.html?id=' + a.id + '" style="flex:1; font-weight:600;">' + esc(a.nome) + "</a>" +
            (inadIds[a.id] ? '<span class="tag erro">em atraso</span>' : '<span class="tag ok">em dia</span>') + "</div>";
        }).join("") : '<div class="vazio">Nenhum aluno na carteira — preencha o campo consultor(a) no cadastro do aluno (Clientes → editar).</div>') +
        "</div>";
    }
    if (aba === "metas") {
      var metas = c.metas || [];
      p = '<div class="card"><div class="linha-flex" style="justify-content: space-between;"><h2>Metas do colaborador</h2>' +
        '<button class="btn mini" id="btnMeta">+ Nova meta</button></div>' +
        '<p class="muted" style="margin: 4px 0 10px; font-size: 13px;">Metas individuais como no EVO (ex.: 20 vendas no mês, 90% de renovação). Metas de vendas por equipe ficam em <a href="metas.html">Metas de Vendas</a>.</p>' +
        (metas.length ? metas.map(function (m) {
          return '<div class="linha-flex" style="gap: 10px; padding: 7px 0; border-top: 1px solid var(--linha); align-items: center;">' +
            '<input type="checkbox" data-metaok="' + m.id + '"' + (m.feito ? " checked" : "") + ">" +
            '<span style="flex:1;' + (m.feito ? "text-decoration:line-through; color:var(--cinza);" : "") + '">' + esc(m.titulo) +
            (m.prazo ? ' <span class="muted">(até ' + S.fmtData(m.prazo) + ")</span>" : "") + "</span>" +
            '<button class="btn sec mini" data-metarm="' + m.id + '">🗑</button></div>';
        }).join("") : '<div class="vazio">Nenhuma meta ainda — combine as metas do mês com o colaborador.</div>') +
        "</div>";
    }
    $("painelAba").innerHTML = p;

    // salvar campos da aba ativa
    [["cNome", "nome"], ["cGenero", "genero"], ["cEmail", "email"], ["cZap", "zap"], ["cCargo", "cargo"],
     ["cAdmissao", "admissao"], ["cEndereco", "endereco"], ["cCpf", "cpf"], ["cEmgNome", "emergenciaNome"],
     ["cEmgFone", "emergenciaFone"], ["cTipo", "tipoContrato"], ["cBanco", "banco"], ["cObsC", "obsContratacao"],
     ["cNasc", "nascimento"], ["cCref", "cref"], ["cPis", "pis"], ["cCarteirinha", "carteirinha"], ["cFuncao", "funcao"]]
      .forEach(function (par) { salvaCampo(par[0], par[1]); });
    salvaCampo("cSalario", "salario", function (el) { return +el.value || 0; });
    salvaCampo("cValorHora", "valorHora", function (el) { return +el.value || 0; });
    salvaCampo("cValorHoraDF", "valorHoraDF", function (el) { return +el.value || 0; });
    // horista/diarista não tem salário fixo: o campo trava e a folha vira horas × valor hora
    function ajustaVinculo() {
      var sel = $("cTipo");
      if (!sel) return;
      var horista = /horista|diarista/i.test(sel.value);
      var sal = $("cSalario"), hint = $("hintVinculo"), bF2 = $("btnFolha"), nota = $("folhaNota");
      if (sal) {
        sal.disabled = horista;
        if (horista) sal.value = "";
        sal.style.opacity = horista ? ".45" : "1";
      }
      if (hint) hint.textContent = horista
        ? "⏱ HORISTA: não recebe salário fixo — preencha o VALOR HORA (e o de dom/feriado, se for maior). O pagamento do mês sai das horas batidas no ponto, separando domingos e feriados."
        : (sel.value ? "💼 Salário fixo mensal — preencha o campo Salário mensal." : "");
      if (bF2) bF2.textContent = horista ? "💲 Lançar horas do mês em Contas a Pagar" : "💲 Lançar salário do mês em Contas a Pagar";
      if (nota) nota.textContent = horista
        ? "calcula horas batidas no ponto × valor hora; centro Folha de pagamento, vencimento dia 5"
        : 'entra no centro "Folha de pagamento", vencimento dia 5 do mês seguinte';
    }
    if ($("cTipo")) {
      $("cTipo").addEventListener("change", ajustaVinculo);
      ajustaVinculo();
    }

    Array.prototype.forEach.call(document.querySelectorAll("[data-h]"), function (inp) {
      inp.addEventListener("change", function () {
        var st2 = load();
        var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
        c2.horario = c2.horario || {};
        var i = this.getAttribute("data-h");
        (c2.horario[i] = c2.horario[i] || {})[this.getAttribute("data-c")] = this.value;
        S.write("equipe", st2);
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll('[name="perfil"]'), function (r) {
      r.addEventListener("change", function () {
        var st2 = load();
        var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
        c2.permissaoId = this.value;
        S.write("equipe", st2);
      });
    });
    var bSP = $("btnSemPerm");
    if (bSP) bSP.onclick = function () {
      var st2 = load();
      var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
      delete c2.permissaoId;
      S.write("equipe", st2);
      render();
    };

    // metas do colaborador
    var bM = $("btnMeta");
    if (bM) bM.onclick = function () {
      var titulo = (prompt("Qual a meta? (ex.: 20 vendas no mês)") || "").trim();
      if (!titulo) return;
      var prazo = (prompt("Prazo (AAAA-MM-DD) — pode deixar vazio:") || "").trim();
      var st2 = load();
      var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
      (c2.metas = c2.metas || []).push({ id: S.uid(), titulo: titulo, prazo: prazo, feito: false });
      S.write("equipe", st2);
      render();
    };
    Array.prototype.forEach.call(document.querySelectorAll("[data-metaok]"), function (cb) {
      cb.addEventListener("change", function () {
        var st2 = load();
        var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
        var m = (c2.metas || []).find(function (y) { return y.id === cb.getAttribute("data-metaok"); });
        if (m) { m.feito = cb.checked; S.write("equipe", st2); render(); }
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-metarm]"), function (bt) {
      bt.addEventListener("click", function () {
        if (!confirm("Excluir essa meta?")) return;
        var st2 = load();
        var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
        c2.metas = (c2.metas || []).filter(function (y) { return y.id !== bt.getAttribute("data-metarm"); });
        S.write("equipe", st2);
        render();
      });
    });

    var bF = $("btnFolha");
    if (bF) bF.onclick = function () {
      var st2 = load();
      var c2 = st2.colaboradores.find(function (x) { return x.id === colId; });
      var horista = /horista|diarista/i.test(c2.tipoContrato || "");
      var comp = S.todayISO().slice(0, 7);
      var valor, desc;
      if (horista) {
        if (!+c2.valorHora) { alert("Preencha o valor hora primeiro — horista não tem salário fixo."); return; }
        var hh = S.horasPonto(st2.ponto, c2.nome, comp);
        if (!hh.norm && !hh.domfer) { alert("Nenhuma hora batida no ponto em " + comp + " — registre entrada e saída em Colaboradores → Ponto do dia."); return; }
        var vDF = +c2.valorHoraDF || +c2.valorHora;
        valor = Math.round((hh.norm * +c2.valorHora + hh.domfer * vDF) * 100) / 100;
        desc = "Horas " + comp + " (" + String(hh.norm).replace(".", ",") + "h × " + S.fmtBRL(+c2.valorHora) +
          (hh.domfer ? " + " + String(hh.domfer).replace(".", ",") + "h dom/fer × " + S.fmtBRL(vDF) : "") + ") — " + c2.nome;
      } else {
        if (!+c2.salario) { alert("Preencha o salário mensal primeiro."); return; }
        valor = +c2.salario;
        desc = "Salário " + comp + " — " + c2.nome;
      }
      var hoje = new Date(S.todayISO() + "T12:00");
      var venc = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 5);
      var stC = S.read("contas", { centros: [], contas: [] });
      if (stC.contas.some(function (x) { return x.desc === desc; })) { alert("Este lançamento de " + comp + " já foi feito."); return; }
      stC.contas.push({ id: S.uid(), desc: desc, forn: c2.nome, centro: "Folha de pagamento",
        valor: valor, vencimento: S.todayISO(venc), status: "aberto" });
      S.write("contas", stC);
      alert("Lançado! " + desc + " (" + S.fmtBRL(valor) + ") nas Contas a Pagar, vencimento " + S.fmtData(S.todayISO(venc)) + ".");
    };

    $("abas").addEventListener("click", function (e) {
      var b = e.target.closest("button"); if (!b) return;
      aba = b.getAttribute("data-ab");
      render();
    });
  }

  S.onChange(function (k) { if (k === "equipe") { /* campos salvam sozinhos; sem re-render para não perder foco */ } });
  render();
})();
</script>
</body>
</html>
