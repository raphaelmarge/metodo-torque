<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controle de Entradas — Método Torque</title>
<link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml">
<link href="../assets/fonts/archivo.css" rel="stylesheet">
<link href="apps.css" rel="stylesheet">
<style>
  .busca-grande input { font-size: 18px; padding: 14px 16px; width: 100%; }
  .resultado { display: flex; gap: 12px; align-items: center; padding: 11px 14px; background: #fff; border: 1px solid var(--linha); cursor: pointer; flex-wrap: wrap; }
  .resultado + .resultado { margin-top: -1px; }
  .resultado:hover { background: var(--fundo); }
  .resultado .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--roxo); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; flex: none; }
  .painel-lib { border: 2px solid var(--linha); background: #fff; padding: 18px; }
  .painel-lib.ok { border-color: var(--ok); }
  .painel-lib.atencao { border-color: var(--alerta); }
  .painel-lib.bloq { border-color: var(--erro); }
  .aviso { display: flex; gap: 8px; align-items: center; padding: 8px 12px; margin-top: 8px; font-size: 13.5px; border: 1px solid; }
  .aviso.erro { color: var(--erro); border-color: rgba(220,38,38,.4); background: rgba(220,38,38,.05); }
  .aviso.alerta { color: var(--alerta); border-color: rgba(217,119,6,.4); background: rgba(217,119,6,.06); }
  .aviso.info { color: var(--cinza); border-color: var(--linha); background: var(--fundo); }
  .entrada-linha { display: flex; gap: 10px; align-items: center; padding: 8px 14px; background: #fff; border: 1px solid var(--linha); font-size: 13.5px; }
  .entrada-linha + .entrada-linha { margin-top: -1px; }
  .entrada-linha .hora { font-weight: 800; font-variant-numeric: tabular-nums; }
  @media (max-width: 900px) { main.corpo { display: flex !important; flex-direction: column; } }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <img id="logoCliente" class="logo-cliente" alt="Logo da academia" hidden>
    <div>
    <span class="kicker">PROGRAMA · RECEPÇÃO</span>
    <h1>Controle de Entradas</h1>
    </div>
  </div>
  <p>A catraca virtual da recepção: busque o aluno, veja na hora se está tudo em dia (mensalidade, contrato, PAR-Q) e libere a entrada com um toque.</p>
</header>

<main class="corpo" style="display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; align-items: start;">

  <div style="display: flex; flex-direction: column; gap: 14px;">
    <div id="flashOk" hidden style="background: #eaf6ec; border: 1px solid rgba(22,163,74,.4); color: #2e7d32; padding: 14px 16px; border-radius: 6px; font-weight: 700; font-size: 15px;"></div>
    <div class="card busca-grande">
      <div class="campo"><label>Aluno</label>
        <div class="linha-flex" style="gap:8px;">
          <input id="busca" placeholder="digite o nome…" autocomplete="off" style="flex:1;">
          <button class="btn sec" id="btnQR" title="Ler o QR da carteirinha do app do aluno">📷 Ler QR</button>
        </div>
      </div>
      <div id="areaQR" hidden style="position:relative;margin-top:10px;">
        <video id="videoQR" playsinline muted style="width:100%;max-height:280px;background:#000;border-radius:8px;object-fit:cover;"></video>
        <p class="muted" id="qrStatus" style="margin-top:6px;font-size:13px;">Aponte a câmera para o QR da carteirinha…</p>
      </div>
      <div id="resultados" style="margin-top: 10px;"></div>
    </div>
    <div id="painel"></div>
    <div class="card">
      <h2 style="margin-bottom: 8px;">Controle de acesso (como no EVO)</h2>
      <div class="campo"><label>Mensagem de boas-vindas (aparece ao liberar)</label>
        <input id="cfgMsgAcesso" placeholder="Olá, seja bem-vindo e tenha um ótimo treino!">
      </div>
      <div class="linha-flex" style="gap: 10px; align-items: flex-end; flex-wrap: wrap;">
        <div class="campo" style="margin:0;"><label>Bloquear por inadimplência após (dias) — 0 desliga</label>
          <input id="cfgInadDias" type="number" min="0" max="90" style="width: 110px;">
        </div>
        <div class="campo" style="flex:1; min-width: 220px; margin:0;"><label>Mensagem de bloqueio por inadimplência</label>
          <input id="cfgMsgInad" placeholder="Acesso bloqueado por pendência — procure a recepção.">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="linha-flex" style="justify-content: space-between;">
      <h2>Entradas de hoje</h2>
      <span class="tag roxo" id="totalHoje">0</span>
    </div>
    <div id="listaHoje" style="margin-top: 10px;"></div>
  </div>
</main>

<script src="../assets/access-config.js"></script>
<script src="../assets/cloud-config.js"></script>
<script src="../assets/vendor/supabase.js"></script>
<script src="store.js"></script>
<script>
(function () {
  "use strict";
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { return String(s == null ? "" : s).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }
  function ini(n) { return String(n || "?").split(" ").map(function (p) { return p[0]; }).slice(0, 2).join("").toUpperCase(); }

  function stA() { return S.read("alunos", { alunos: [], planos: [], recebiveis: [] }); }

  // situação do aluno para a liberação
  function situacao(a) {
    var st = stA();
    var hoje = S.todayISO();
    var avisos = [];
    var nivel = "ok"; // ok | atencao | bloq
    var ativos = (a.contratos || []).filter(function (c) { return c.status === "ativo" || c.status === "congelado"; });
    if (!ativos.length) {
      avisos.push({ t: "erro", txt: "Sem contrato ativo — fazer matrícula ou renovação antes de liberar." });
      nivel = "bloq";
    } else {
      var fimMax = null;
      ativos.forEach(function (c) {
        var f = new Date((c.inicio || "2000-01-01") + "T12:00");
        f.setMonth(f.getMonth() + (c.meses || 1));
        f.setDate(f.getDate() + (+c.diasCreditados || 0));
        var iso = S.todayISO(f);
        if (!fimMax || iso > fimMax) fimMax = iso;
      });
      if (fimMax < hoje) { avisos.push({ t: "erro", txt: "Contrato vencido em " + S.fmtData(fimMax) + " — encaminhar para renovação." }); nivel = "bloq"; }
      if (ativos.every(function (c) { return (c.inicio || "") > hoje; })) {
        avisos.push({ t: "erro", txt: "Contrato NA FILA — começa em " + S.fmtData(ativos[0].inicio) + ". Aluno inativo até lá (regra do EVO)." });
        nivel = "bloq";
      }
      if (ativos.some(function (c) { return c.status === "congelado"; }) && ativos.every(function (c) { return c.status === "congelado"; })) {
        avisos.push({ t: "alerta", txt: "Plano congelado — confirmar reativação na ficha do aluno." });
        if (nivel === "ok") nivel = "atencao";
      }
    }
    if (a.restrito && (!a.restrito.ate || a.restrito.ate >= hoje)) {
      avisos.push({ t: "erro", txt: "Cliente RESTRITO desde " + S.fmtData(a.restrito.em) + " — não liberar (regra do EVO). Procure a gestão." });
      nivel = "bloq";
    }
    // agregadores (Wellhub/TotalPass): a entrada do dia é liberada pelo
    // check-in do app — validado, vira uma "diária" que desbloqueia até 23:59
    var pedirTokenAgg = null;
    var planoAgg = null;
    ativos.forEach(function (c) {
      var pl = (st.planos || []).find(function (p) { return p.id === c.planoId; });
      if (pl && pl.tipo === "agregador") planoAgg = pl;
    });
    if (planoAgg) {
      var diaria = S.read("wellhub", { checkins: [] }).checkins.find(function (k) {
        return k.alunoId === a.id && (k.quando || "").slice(0, 10) === hoje;
      });
      if (diaria) {
        var hDia = new Date(diaria.quando).toTimeString().slice(0, 5);
        avisos.push({ t: "info", txt: "✅ Diária " + planoAgg.nome + " liberada — check-in do app validado às " + hDia + " (vale até 23:59)." });
      } else {
        avisos.push({ t: "erro", txt: "Aluno " + planoAgg.nome + " SEM check-in do app hoje — peça pra fazer o check-in no aplicativo e valide o token abaixo." });
        nivel = "bloq";
        pedirTokenAgg = planoAgg.nome;
      }
    }
    // regras de acesso do contrato (limite de entradas + horário permitido, regra do EVO)
    var contratoAcesso = ativos.find(function (c) { return !c.principalId; }) || ativos[0];
    var planoAc = contratoAcesso && (st.planos || []).find(function (p) { return p.id === contratoAcesso.planoId; });
    var rAc = (planoAc && planoAc.regras) || {};
    if (rAc.entradaModo && rAc.entradaQtd) {
      var agora = new Date();
      var desde;
      if (rAc.entradaModo === "dia") desde = hoje;
      else if (rAc.entradaModo === "semana") { var w = new Date(agora); w.setDate(w.getDate() - w.getDay()); desde = S.todayISO(w); }
      else desde = hoje.slice(0, 7);
      var usados = (a.checkins || []).filter(function (t) {
        var d = (t || "").slice(0, 10);
        return rAc.entradaModo === "mes" ? d.slice(0, 7) === desde : d >= desde;
      }).length;
      if (usados >= rAc.entradaQtd) {
        avisos.push({ t: "erro", txt: "Limite de entradas do contrato atingido (" + rAc.entradaQtd + " por " + rAc.entradaModo + ") — " + usados + " nesta janela." });
        nivel = "bloq";
      } else {
        avisos.push({ t: "info", txt: "Entradas: " + usados + "/" + rAc.entradaQtd + " por " + rAc.entradaModo + "." });
      }
    }
    if ((rAc.dias && rAc.dias.length) || rAc.horaDe || rAc.horaAte) {
      var ag = new Date();
      var diaOk = !rAc.dias || !rAc.dias.length || rAc.dias.indexOf(ag.getDay()) >= 0;
      var hhmm = ag.toTimeString().slice(0, 5);
      var horaOk = (!rAc.horaDe || hhmm >= rAc.horaDe) && (!rAc.horaAte || hhmm <= rAc.horaAte);
      if (!diaOk || !horaOk) {
        var faixa = (rAc.horaDe || "00:00") + "–" + (rAc.horaAte || "23:59");
        avisos.push({ t: "erro", txt: "Fora do horário de contrato — este plano libera só " + (rAc.dias && rAc.dias.length ? ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"].filter(function (_, i) { return rAc.dias.indexOf(i) >= 0; }).join("/") + " " : "") + faixa + "." });
        nivel = "bloq";
      }
    }
    var susp = S.read("suspensoes", { itens: [] }).itens.find(function (s2) {
      return s2.alunoId === a.id && !s2.finalizadaEm && s2.inicio <= hoje && (!s2.fim || s2.fim >= hoje);
    });
    if (susp) {
      avisos.push({ t: "erro", txt: "Contrato SUSPENSO desde " + S.fmtData(susp.inicio) + (susp.motivo ? " (" + susp.motivo + ")" : "") + " — reativar em Suspensões antes de liberar." });
      nivel = "bloq";
    }
    var atraso = 0, maiorAtrasoDias = 0;
    st.recebiveis.forEach(function (r) {
      if (r.alunoId === a.id && r.status === "aberto" && r.vencimento < hoje) {
        atraso += +r.valor || 0;
        var dd = Math.round((new Date(hoje) - new Date(r.vencimento)) / 864e5);
        if (dd > maiorAtrasoDias) maiorAtrasoDias = dd;
      }
    });
    if (atraso > 0) {
      // bloqueio por inadimplência após N dias (Controle de Acesso do EVO)
      var cfgB = S.read("config", { dados: {} }).bloqueio || {};
      var lim = +cfgB.inadDias || 0;
      if (lim > 0 && maiorAtrasoDias >= lim) {
        avisos.push({ t: "erro", txt: (cfgB.msgInad || "Acesso bloqueado por inadimplência") + " — " + S.fmtBRL(atraso) + " em aberto há " + maiorAtrasoDias + " dia(s)." });
        nivel = "bloq";
      } else {
        avisos.push({ t: "alerta", txt: "Mensalidade em atraso: " + S.fmtBRL(atraso) + " — lembrar na saída." });
        if (nivel === "ok") nivel = "atencao";
      }
    }
    var stParq = S.read("parq", { fichas: {}, config: {} });
    var parq = (stParq.fichas || {})[a.id];
    var cfgP = stParq.config || {};
    var parqVencido = false;
    if (parq && +cfgP.validadeMeses) {
      var vP = new Date(parq.data + "T12:00"); vP.setMonth(vP.getMonth() + (+cfgP.validadeMeses));
      parqVencido = S.todayISO(vP) < hoje;
    }
    var modoP = cfgP.bloqueio || "aviso";
    if (modoP !== "off") {
      if (!parq) {
        if (modoP === "bloqueia") { avisos.push({ t: "erro", txt: "PAR-Q não preenchido — obrigatório antes de liberar (regra do EVO)." }); nivel = "bloq"; }
        else avisos.push({ t: "info", txt: "PAR-Q ainda não preenchido — aproveitar para fazer hoje." });
      } else if (parqVencido) {
        if (modoP === "bloqueia") { avisos.push({ t: "erro", txt: "PAR-Q VENCIDO — refazer antes de liberar." }); nivel = "bloq"; }
        else { avisos.push({ t: "alerta", txt: "PAR-Q vencido — pedir para refazer." }); if (nivel === "ok") nivel = "atencao"; }
      } else if (parq.temSim) {
        avisos.push({ t: "alerta", txt: "PAR-Q com 'Sim' — confirmar avaliação médica antes do treino." });
        if (nivel === "ok") nivel = "atencao";
      }
    }
    var jaHoje = (a.checkins || []).some(function (t) { return (t || "").slice(0, 10) === hoje; });
    if (jaHoje) avisos.push({ t: "info", txt: "Já tem check-in registrado hoje." });
    return { avisos: avisos, nivel: nivel, pedirTokenAgg: pedirTokenAgg };
  }

  var selId = null;

  function renderResultados() {
    var q = $("busca").value.trim().toLowerCase();
    if (q.length < 2) { $("resultados").innerHTML = ""; return; }
    var lista = stA().alunos.filter(function (a) {
      return a.status !== "inativo" && a.nome.toLowerCase().indexOf(q) >= 0;
    }).slice(0, 8);
    $("resultados").innerHTML = lista.map(function (a) {
      return '<div class="resultado" data-sel="' + a.id + '"><span class="avatar">' + esc(ini(a.nome)) + "</span>" +
        "<strong style='flex:1'>" + esc(a.nome) + "</strong><span class='muted'>ver situação →</span></div>";
    }).join("") || '<div class="vazio">Nenhum aluno ativo com esse nome.</div>';
  }

  function renderPainel() {
    if (!selId) { $("painel").innerHTML = ""; return; }
    var a = stA().alunos.find(function (x) { return x.id === selId; });
    if (!a) { $("painel").innerHTML = ""; return; }
    var s = situacao(a);
    var titulo = s.nivel === "bloq" ? "⛔ VERIFICAR ANTES DE LIBERAR" : s.nivel === "atencao" ? "⚠ LIBERAR COM AVISO" : "✅ TUDO EM DIA";
    var cor = s.nivel === "bloq" ? "var(--erro)" : s.nivel === "atencao" ? "var(--alerta)" : "var(--ok)";
    $("painel").innerHTML = '<div class="painel-lib ' + s.nivel + '">' +
      '<div class="linha-flex" style="justify-content: space-between;">' +
      "<h2 style='margin:0; text-transform:none; letter-spacing:0; font-size:17px;'>" + esc(a.nome) + "</h2>" +
      '<strong style="color:' + cor + '">' + titulo + "</strong></div>" +
      s.avisos.map(function (v) { return '<div class="aviso ' + v.t + '">' + esc(v.txt) + "</div>"; }).join("") +
      '<div class="linha-flex" style="margin-top: 14px; justify-content: flex-end;">' +
      '<a class="btn sec mini" href="perfil-aluno.html?id=' + a.id + '">Abrir perfil</a>' +
      convidBtn(a) +
      (s.pedirTokenAgg ? '<button class="btn" id="btnTokenAgg">📲 Validar check-in do app (' + esc(s.pedirTokenAgg) + ")</button>" : "") +
      '<button class="btn" id="btnLiberar">✓ Liberar entrada</button></div></div>';
    var bAgg = $("btnTokenAgg");
    if (bAgg) bAgg.onclick = function () {
      var token = prompt("Token/código do check-in no app " + s.pedirTokenAgg + " (confira na tela do aluno):");
      if (token === null) return;
      token = token.trim();
      var w = S.read("wellhub", { checkins: [], config: {} });
      w.checkins.push({ id: S.uid(), alunoId: a.id, nome: a.nome, agregador: s.pedirTokenAgg, quando: new Date().toISOString(), token: token, origem: "recepcao" });
      S.write("wellhub", w);
      renderPainel(); // agora a diária existe — o painel libera sozinho
    };
    var bConv = $("btnConvidado");
    if (bConv) bConv.onclick = function () { registrarConvidado(a); };
    $("btnLiberar").onclick = function () {
      var st = stA();
      var al = st.alunos.find(function (x) { return x.id === selId; });
      (al.checkins = al.checkins || []).push(new Date().toISOString());
      S.write("alunos", st);
      // mensagem de boas-vindas configurável (Controle de Acesso do EVO)
      var msg = (S.read("config", { dados: {} }).msgAcesso || "").trim() || "Olá, seja bem-vindo e tenha um ótimo treino!";
      var fl = $("flashOk");
      fl.textContent = "✅ " + al.nome.split(" ")[0] + " — " + msg;
      fl.hidden = false;
      clearTimeout(fl._t);
      fl._t = setTimeout(function () { fl.hidden = true; }, 5000);
      selId = null;
      $("busca").value = "";
      renderResultados(); renderPainel(); renderHoje();
    };
  }

  function cotaConvidados(a) {
    var st = stA();
    var c = (a.contratos || []).find(function (x) { return x.status === "ativo"; });
    var pl = c && (st.planos || []).find(function (p) { return p.id === c.planoId; });
    var total = (pl && +pl.convidadosMes) || 0;
    var mes = S.todayISO().slice(0, 7);
    var usados = S.read("convidados", { itens: [] }).itens.filter(function (x) {
      return x.anfitriaoId === a.id && (x.data || "").slice(0, 7) === mes;
    }).length;
    return { total: total, usados: usados, resta: Math.max(0, total - usados) };
  }
  function convidBtn(a) {
    var q = cotaConvidados(a);
    if (!q.total) return "";
    return '<button class="btn sec mini" id="btnConvidado" title="Convidados restantes neste mês: ' + q.resta + '">👥 Convidado (' + q.resta + "/" + q.total + ")</button>";
  }
  function registrarConvidado(a) {
    var q = cotaConvidados(a);
    if (q.resta <= 0) { alert("Cota de convidados esgotada neste mês (" + q.total + "/mês). Renova no dia 1º."); return; }
    var nome = prompt("Nome do convidado de " + a.nome + " (cota: " + q.resta + " restante(s) neste mês):") || "";
    if (!nome.trim()) return;
    var st = S.read("convidados", { itens: [] });
    // limites globais de convidados (Configurações → Avançado, como no EVO)
    var av = S.read("config", { dados: {} }).avancado || {};
    var hoje2 = S.todayISO(), mes2 = hoje2.slice(0, 7);
    var nomeNorm = nome.trim().toLowerCase();
    if (+av.convPorDia > 0) {
      var doDia = st.itens.filter(function (x) { return x.anfitriaoId === a.id && x.data === hoje2; }).length;
      if (doDia >= +av.convPorDia) { alert("Limite de convidados por dia atingido (" + av.convPorDia + "/dia por cliente — Configurações → Avançado)."); return; }
    }
    if (+av.convPessoaMes > 0) {
      var vezes = st.itens.filter(function (x) { return (x.nome || "").trim().toLowerCase() === nomeNorm && (x.data || "").slice(0, 7) === mes2; }).length;
      if (vezes >= +av.convPessoaMes) { alert(nome.trim() + " já foi convidado(a) " + vezes + "x neste mês — limite de " + av.convPessoaMes + "x/mês por pessoa (Configurações → Avançado)."); return; }
    }
    st.itens.push({ id: S.uid(), anfitriaoId: a.id, anfitriao: a.nome, nome: nome.trim(), data: S.todayISO(), hora: new Date().toTimeString().slice(0, 5) });
    S.write("convidados", st);
    alert("Convidado " + nome.trim() + " liberado hoje (até 23:59). Lembre de conferir o PAR-Q antes do treino, como no EVO.");
    renderPainel(); renderHoje();
  }

  function renderHoje() {
    var hoje = S.todayISO();
    var entradas = [];
    stA().alunos.forEach(function (a) {
      (a.checkins || []).forEach(function (t) {
        if ((t || "").slice(0, 10) === hoje) entradas.push({ nome: a.nome, hora: new Date(t).toTimeString().slice(0, 5) });
      });
    });
    S.read("convidados", { itens: [] }).itens.forEach(function (g) {
      if ((g.data || "") === hoje) entradas.push({ nome: g.nome + " (convidado de " + (g.anfitriao || "?").split(" ")[0] + ")", hora: g.hora || "--:--", convidado: true });
    });
    entradas.sort(function (x, y) { return x.hora < y.hora ? 1 : -1; });
    $("totalHoje").textContent = entradas.length;
    $("listaHoje").innerHTML = entradas.length ? entradas.map(function (e) {
      return '<div class="entrada-linha"' + (e.convidado ? ' style="background:#f4f0ff;"' : "") + '><span class="hora">' + e.hora + "</span><span>" + (e.convidado ? "👥 " : "") + esc(e.nome) + "</span></div>";
    }).join("") : '<div class="vazio">Nenhuma entrada registrada hoje ainda.</div>';
  }

  $("busca").addEventListener("input", function () { selId = null; renderPainel(); renderResultados(); });
  $("cfgMsgAcesso").value = S.read("config", { dados: {} }).msgAcesso || "";
  $("cfgMsgAcesso").addEventListener("change", function () {
    var c = S.read("config", { dados: {} });
    c.msgAcesso = this.value.trim();
    S.write("config", c);
  });
  (function () {
    var c0 = S.read("config", { dados: {} }).bloqueio || {};
    $("cfgInadDias").value = c0.inadDias != null ? c0.inadDias : 15;
    $("cfgMsgInad").value = c0.msgInad || "";
  })();
  ["cfgInadDias", "cfgMsgInad"].forEach(function (id) {
    $(id).addEventListener("change", function () {
      var c = S.read("config", { dados: {} });
      c.bloqueio = c.bloqueio || {};
      c.bloqueio.inadDias = +$("cfgInadDias").value || 0;
      c.bloqueio.msgInad = $("cfgMsgInad").value.trim();
      S.write("config", c);
    });
  });
  // leitor do QR da carteirinha (código de 8 caracteres do aluno)
  var qrStream = null, qrTimer = null;
  function codigoDe(a) { return String(a.id).replace(/[^a-z0-9]/gi, "").slice(-8).toUpperCase(); }
  function paraQR() {
    clearInterval(qrTimer);
    if (qrStream) { qrStream.getTracks().forEach(function (t) { t.stop(); }); qrStream = null; }
    $("areaQR").hidden = true;
    $("btnQR").textContent = "📷 Ler QR";
  }
  $("btnQR").addEventListener("click", function () {
    if (qrStream) { paraQR(); return; }
    if (!("BarcodeDetector" in window)) {
      alert("Este navegador não tem leitor de QR embutido (use o Chrome no computador ou Android). O aluno também pode ditar o código de 8 letras que aparece na carteirinha.");
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function (stream) {
      qrStream = stream;
      $("areaQR").hidden = false;
      $("btnQR").textContent = "✕ Fechar câmera";
      var v = $("videoQR");
      v.srcObject = stream;
      v.play();
      var det = new BarcodeDetector({ formats: ["qr_code"] });
      qrTimer = setInterval(function () {
        det.detect(v).then(function (codes) {
          if (!codes || !codes.length) return;
          var lido = String(codes[0].rawValue || "").trim().toUpperCase();
          if (!lido) return;
          var a = stA().alunos.find(function (x) { return codigoDe(x) === lido; });
          if (a) {
            paraQR();
            selId = a.id;
            $("busca").value = a.nome;
            renderPainel();
          } else {
            $("qrStatus").textContent = "QR lido (" + lido + ") mas não achei o aluno — confira o cadastro.";
          }
        }).catch(function () {});
      }, 400);
    }).catch(function () {
      alert("Não consegui acessar a câmera — confira a permissão do navegador.");
    });
  });

  $("resultados").addEventListener("click", function (e) {
    var r = e.target.closest("[data-sel]"); if (!r) return;
    selId = r.getAttribute("data-sel");
    renderPainel();
  });

  S.onChange(function (k) { if (k === "alunos") { renderHoje(); renderPainel(); } });
  renderHoje();
})();
</script>
</body>
</html>
