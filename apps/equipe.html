<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Colaboradores — Método Torque</title>
<link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml">
<link href="../assets/fonts/archivo.css" rel="stylesheet">
<link href="apps.css" rel="stylesheet">
<style>
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .stats .card { text-align: center; padding: 14px; }
  .stats .n { font-size: 26px; font-weight: 800; }
  .colab { display: flex; gap: 12px; align-items: center; padding: 11px 14px; background: #fff; border: 1px solid var(--linha); flex-wrap: wrap; }
  .colab + .colab { margin-top: -1px; }
  .colab .avatar { width: 40px; height: 40px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; flex: none; }
  .colab .quem { flex: 1; min-width: 160px; }
  .colab .quem strong { font-size: 14.5px; }
  .colab .quem .sub { font-size: 12px; color: var(--cinza); }
  .colab.inativo { opacity: .5; }
</style>
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <img id="logoCliente" class="logo-cliente" alt="Logo da academia" hidden>
    <div>
    <span class="kicker">PROGRAMA · ADMINISTRATIVO</span>
    <h1>Colaboradores</h1>
    </div>
  </div>
  <p>Sua equipe com cargo, contato e data de admissão — a base para escalas, comissões e a folha de função do método.</p>
</header>

<main class="corpo" style="display: flex; flex-direction: column; gap: 16px;">

  <div class="stats" id="stats"></div>

  <div class="card linha-flex" style="justify-content: space-between;">
    <div class="linha-flex">
      <input id="busca" placeholder="Pesquisar por nome ou cargo…" style="width: 260px;">
      <select id="fCargo" style="width: auto;"><option value="">Todos os cargos</option></select>
      <label style="margin: 0; font-size: 13px;"><input type="checkbox" id="verInativos" style="width: auto; margin-right: 4px;">mostrar inativos</label>
    </div>
    <button class="btn" id="btnNovo">+ Colaborador(a)</button>
  </div>

  <div id="lista"></div>

  <details class="card" id="cardSalarios">
    <summary style="cursor: pointer; font-weight: 800;">💰 Salários de colaboradores (relatório do EVO)</summary>
    <div id="salarios" style="margin-top: 12px; overflow-x: auto;"></div>
  </details>
</main>

<dialog id="dlg">
  <form class="card" method="dialog" style="display: flex; flex-direction: column; gap: 14px; width: 460px; max-width: 100%;">
    <h2 id="dlgTitulo">Novo colaborador(a)</h2>
    <div class="campo"><label>Nome *</label><input id="fNome" required></div>
    <div class="grid-2">
      <div class="campo"><label>Cargo *</label>
        <div class="linha-flex" style="gap: 6px;">
          <select id="fCargoSel" style="flex: 1;"></select>
          <button type="button" class="btn sec mini" id="fCargoMais" title="Novo cargo">+</button>
        </div>
      </div>
      <div class="campo"><label>Admissão</label><input id="fAdmissao" type="date"></div>
    </div>
    <div class="grid-2">
      <div class="campo"><label>WhatsApp</label><input id="fZap" inputmode="numeric" placeholder="31999998888"></div>
      <div class="campo"><label>E-mail</label><input id="fEmail" type="email"></div>
    </div>
    <div class="campo"><label>Vínculo</label>
      <select id="fTipo">
        <option value="">— definir depois na ficha —</option>
        <option>CLT</option><option>PJ</option><option>Estágio</option>
        <option>Horista</option><option>Diarista</option>
      </select>
      <small class="muted" id="fTipoNota" style="display:block;margin-top:4px;"></small>
    </div>
    <div class="linha-flex" style="justify-content: space-between;">
      <button type="button" class="btn perigo mini" id="fDesativar" hidden>Desativar</button>
      <div class="linha-flex">
        <button class="btn sec" value="cancel" formnovalidate>Cancelar</button>
        <button class="btn" value="ok">Salvar</button>
      </div>
    </div>
  </form>
</dialog>

<script src="../assets/access-config.js"></script>
<script src="../assets/cloud-config.js"></script>
<script src="../assets/vendor/supabase.js"></script>
<script src="store.js"></script>
<script>
(function () {
  "use strict";
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { return String(s == null ? "" : s).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }

  var CARGOS_PADRAO = ["Recepção", "Consultor(a) de vendas", "Professor(a)", "Personal trainer", "Limpeza", "Manutenção", "Gerente"];
  var CORES = ["#7c3aed", "#0ea5a5", "#f59e0b", "#dc2626", "#16a34a", "#2563eb", "#db2777"];
  function load() {
    var st = S.read("equipe", null);
    if (!st) st = { cargos: CARGOS_PADRAO.slice(), colaboradores: [] };
    st.cargos = st.cargos || []; st.colaboradores = st.colaboradores || [];
    return st;
  }
  function save(st) { S.write("equipe", st); render(); }

  var busca = "", filtroCargo = "", verInativos = false, editId = null;
  function ehHorista(c) { return /horista|diarista/i.test(c.tipoContrato || ""); }
  function tagVinculo(c) {
    if (ehHorista(c)) return '<span class="tag" style="background:rgba(245,158,11,.15);color:#b45309;" title="Sem salário fixo — recebe por hora batida no ponto">⏱ HORISTA</span> ';
    if (c.tipoContrato) return '<span class="tag neutro" title="Recebe salário fixo mensal (' + esc(c.tipoContrato) + ')">💼 SALÁRIO FIXO</span> ';
    return "";
  }

  function render() {
    var st = load();
    var ativos = st.colaboradores.filter(function (c) { return c.ativo !== false; });
    var porCargo = {};
    ativos.forEach(function (c) { porCargo[c.cargo] = (porCargo[c.cargo] || 0) + 1; });
    var top = Object.keys(porCargo).sort(function (a, b) { return porCargo[b] - porCargo[a]; }).slice(0, 3);
    $("stats").innerHTML =
      '<div class="card"><div class="n">' + ativos.length + '</div><div class="muted">na equipe</div></div>' +
      top.map(function (cg) {
        return '<div class="card"><div class="n">' + porCargo[cg] + '</div><div class="muted">' + esc(cg) + "</div></div>";
      }).join("");

    $("fCargo").innerHTML = '<option value="">Todos os cargos</option>' + st.cargos.map(function (c) {
      return "<option" + (c === filtroCargo ? " selected" : "") + ">" + esc(c) + "</option>";
    }).join("");

    var q = busca.trim().toLowerCase();
    var lista = st.colaboradores.filter(function (c) {
      if (!verInativos && c.ativo === false) return false;
      if (filtroCargo && c.cargo !== filtroCargo) return false;
      if (q && (c.nome + " " + c.cargo).toLowerCase().indexOf(q) === -1) return false;
      return true;
    }).sort(function (a, b) { return a.nome.localeCompare(b.nome); });

    // etiqueta de permissão como na lista de Colaboradores do EVO
    var perfis = {};
    (S.read("permissoes", { perfis: null }).perfis || []).forEach(function (p) { perfis[p.id] = p.nome; });

    $("lista").innerHTML = lista.length ? lista.map(function (c) {
      var ini = c.nome.split(" ").map(function (p) { return p[0]; }).slice(0, 2).join("").toUpperCase();
      var cor = CORES[Math.abs(c.nome.length * 7 + (c.cargo || "").length) % CORES.length];
      return '<div class="colab' + (c.ativo === false ? " inativo" : "") + '" data-id="' + c.id + '">' +
        '<span class="avatar" style="background:' + cor + '">' + esc(ini) + "</span>" +
        '<div class="quem"><strong>' + esc(c.nome) + '</strong><div class="sub">' + esc(c.cargo) +
        (c.admissao ? " · desde " + S.fmtData(c.admissao) : "") + "</div></div>" +
        tagVinculo(c) +
        '<span class="tag ' + (perfis[c.permissaoId] ? "roxo" : "neutro") + '" title="permissão (defina na ficha)">' + esc(perfis[c.permissaoId] || "Sem permissão") + "</span> " +
        (c.ativo === false ? '<span class="tag neutro">INATIVO</span>' : '<span class="tag ok">ATIVO</span>') +
        (c.zap ? ' <a class="btn whats mini" target="_blank" rel="noopener" href="https://wa.me/55' + String(c.zap).replace(/\D/g, "") + '">💬</a>' : "") +
        ' <a class="btn mini" href="colaborador.html?id=' + c.id + '">👔 Ficha</a>' +
        ' <button class="btn sec mini" data-edit="' + c.id + '">✎</button></div>';
    }).join("") : '<div class="vazio">Ninguém aqui ainda — cadastre a equipe.</div>';

    // relatório de salários — mensalistas (salário fixo) separados dos horistas (horas × valor hora)
    var comSalario = st.colaboradores.filter(function (c) { return verInativos || c.ativo !== false; })
      .sort(function (a, b) { return a.nome.localeCompare(b.nome); });
    var mesAtual = S.todayISO().slice(0, 7);
    function horasDoMes(nome) {
      var pts = (st.ponto || []).filter(function (pt) { return pt.nome === nome && (pt.quando || "").slice(0, 7) === mesAtual; })
        .sort(function (a, b) { return a.quando < b.quando ? -1 : 1; });
      var h = 0, aberta = null;
      pts.forEach(function (pt) {
        if (pt.tipo === "entrada") aberta = pt.quando;
        else if (pt.tipo === "saida" && aberta && aberta.slice(0, 10) === pt.quando.slice(0, 10)) {
          h += (new Date(pt.quando) - new Date(aberta)) / 36e5;
          aberta = null;
        }
      });
      return Math.round(h * 100) / 100;
    }
    var mensalistas = comSalario.filter(function (c) { return !ehHorista(c); });
    var horistas = comSalario.filter(ehHorista);
    var totalFixo = 0, totalHoristas = 0;
    function stTag(c) { return c.ativo === false ? '<span class="tag neutro">INATIVO</span>' : '<span class="tag ok">ATIVO</span>'; }
    var html = "<h3 style='margin:4px 0 6px;font-size:13px;'>💼 Salário fixo (mensalistas)</h3>" +
      '<table style="width: 100%; border-collapse: collapse; font-size: 13px;">' +
      "<tr><th style='text-align:left; padding: 6px 8px;'>NOME</th><th style='text-align:left;'>CARGO</th><th style='text-align:left;'>TIPO</th><th style='text-align:right;'>SALÁRIO MENSAL</th><th style='text-align:left; padding-left: 12px;'>STATUS</th></tr>" +
      (mensalistas.length ? mensalistas.map(function (c) {
        totalFixo += c.ativo === false ? 0 : (+c.salario || 0);
        return "<tr style='border-top: 1px solid var(--linha);'><td style='padding: 6px 8px;'><strong>" + esc(c.nome) + "</strong></td><td>" + esc(c.cargo || "—") +
          "</td><td>" + esc(c.tipoContrato || "—") + "</td><td style='text-align:right;'>" + (+c.salario ? S.fmtBRL(+c.salario) : "—") +
          "</td><td style='padding-left: 12px;'>" + stTag(c) + "</td></tr>";
      }).join("") : "<tr><td colspan='5' style='padding:8px;' class='muted'>Nenhum mensalista.</td></tr>") +
      "<tr style='border-top: 2px solid var(--escuro);'><td style='padding: 8px;' colspan='3'><strong>FOLHA FIXA (ativos)</strong></td><td style='text-align:right;'><strong>" + S.fmtBRL(totalFixo) + "</strong></td><td></td></tr></table>" +
      "<h3 style='margin:16px 0 6px;font-size:13px;'>⏱ Horistas e diaristas — sem salário fixo (mês " + mesAtual.split("-").reverse().join("/") + ")</h3>" +
      '<table style="width: 100%; border-collapse: collapse; font-size: 13px;">' +
      "<tr><th style='text-align:left; padding: 6px 8px;'>NOME</th><th style='text-align:left;'>CARGO</th><th style='text-align:left;'>TIPO</th><th style='text-align:right;'>VALOR HORA</th><th style='text-align:right;'>HORAS NO MÊS</th><th style='text-align:right;'>A PAGAR NO MÊS</th><th style='text-align:left; padding-left: 12px;'>STATUS</th></tr>" +
      (horistas.length ? horistas.map(function (c) {
        var h = horasDoMes(c.nome);
        var vlr = Math.round(h * (+c.valorHora || 0) * 100) / 100;
        totalHoristas += c.ativo === false ? 0 : vlr;
        return "<tr style='border-top: 1px solid var(--linha);'><td style='padding: 6px 8px;'><strong>" + esc(c.nome) + "</strong></td><td>" + esc(c.cargo || "—") +
          "</td><td>" + esc(c.tipoContrato || "—") + "</td><td style='text-align:right;'>" + (+c.valorHora ? S.fmtBRL(+c.valorHora) : "<span style='color:#b45309;'>defina na ficha!</span>") +
          "</td><td style='text-align:right;'>" + String(h).replace(".", ",") + "h</td><td style='text-align:right;'><strong>" + S.fmtBRL(vlr) + "</strong></td>" +
          "<td style='padding-left: 12px;'>" + stTag(c) + "</td></tr>";
      }).join("") : "<tr><td colspan='7' style='padding:8px;' class='muted'>Nenhum horista — marque o vínculo Horista/Diarista na ficha de quem recebe por hora.</td></tr>") +
      "<tr style='border-top: 2px solid var(--escuro);'><td style='padding: 8px;' colspan='5'><strong>HORISTAS NO MÊS (ativos)</strong></td><td style='text-align:right;'><strong>" + S.fmtBRL(totalHoristas) + "</strong></td><td></td></tr></table>" +
      "<div style='margin-top:10px;padding:10px 12px;background:var(--fundo);border-radius:8px;font-size:13.5px;'><strong>FOLHA TOTAL DO MÊS: " + S.fmtBRL(totalFixo + totalHoristas) + "</strong> <span class='muted'>(fixa + horistas até agora)</span></div>" +
      '<p class="muted" style="font-size: 12px; margin-top: 8px;">Horista recebe pelas horas batidas no <b>Ponto do dia</b> (entrada 🟢 e saída 🔴) × valor hora da ficha. Salário e valor-hora vêm da aba Contratação; o botão "Lançar na folha" da ficha manda o valor certo para Contas a Pagar.</p>';
    $("salarios").innerHTML = html;
  }

  $("busca").addEventListener("input", function () { busca = this.value; render(); });
  $("fCargo").addEventListener("change", function () { filtroCargo = this.value; render(); });
  $("verInativos").addEventListener("change", function () { verInativos = this.checked; render(); });

  function abre(c) {
    editId = c ? c.id : null;
    var st = load();
    $("dlgTitulo").textContent = c ? "Editar colaborador(a)" : "Novo colaborador(a)";
    $("fCargoSel").innerHTML = st.cargos.map(function (x) {
      return "<option" + (c && c.cargo === x ? " selected" : "") + ">" + esc(x) + "</option>";
    }).join("");
    $("fNome").value = c ? c.nome : "";
    $("fAdmissao").value = c ? (c.admissao || "") : S.todayISO();
    $("fZap").value = c ? (c.zap || "") : "";
    $("fEmail").value = c ? (c.email || "") : "";
    $("fTipo").value = c ? (c.tipoContrato || "") : "";
    atualizaNotaTipo();
    $("fDesativar").hidden = !c || c.ativo === false;
    $("dlg").showModal();
  }
  function atualizaNotaTipo() {
    var v = $("fTipo").value;
    $("fTipoNota").textContent = /horista|diarista/i.test(v)
      ? "⏱ Sem salário fixo — recebe por hora batida no ponto (defina o valor hora na ficha)."
      : v ? "💼 Salário fixo mensal (defina o valor na ficha)." : "";
  }
  $("fTipo").addEventListener("change", atualizaNotaTipo);
  $("btnNovo").onclick = function () { abre(null); };
  $("lista").addEventListener("click", function (e) {
    var id = e.target.getAttribute && e.target.getAttribute("data-edit");
    if (!id) return;
    abre(load().colaboradores.find(function (c) { return c.id === id; }));
  });
  $("fCargoMais").onclick = function () {
    var novo = prompt("Nome do novo cargo:");
    if (!novo) return;
    var st = load();
    if (st.cargos.indexOf(novo) === -1) st.cargos.push(novo);
    S.write("equipe", st);
    $("fCargoSel").innerHTML += "<option selected>" + esc(novo) + "</option>";
    $("fCargoSel").value = novo;
  };
  $("dlg").querySelector("form").addEventListener("submit", function (e) {
    if (e.submitter && e.submitter.value === "cancel") return;
    var st = load();
    var dados = {
      nome: $("fNome").value.trim(), cargo: $("fCargoSel").value,
      admissao: $("fAdmissao").value, zap: $("fZap").value.replace(/\D/g, ""), email: $("fEmail").value.trim(),
      tipoContrato: $("fTipo").value,
    };
    if (editId) {
      var c = st.colaboradores.find(function (x) { return x.id === editId; });
      Object.keys(dados).forEach(function (k) { c[k] = dados[k]; });
    } else {
      dados.id = S.uid(); dados.ativo = true;
      st.colaboradores.push(dados);
    }
    save(st);
  });
  $("fDesativar").onclick = function () {
    if (!confirm("Desativar este colaborador(a)?")) return;
    var st = load();
    st.colaboradores.find(function (x) { return x.id === editId; }).ativo = false;
    $("dlg").close();
    save(st);
  };

  S.onChange(function (k) { if (k === "equipe") render(); });
  render();
})();
</script>
<script>
(function () {
  var S = window.MTStore;
  var $ = function (id) { return document.getElementById(id); };
  function esc(t) { return String(t == null ? "" : t).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }
  var DIAS = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

  function stE() {
    var st = S.read("equipe", { pessoas: [], colaboradores: [], itens: [] });
    st.escala = st.escala || {};
    st.ponto = st.ponto || [];
    return st;
  }
  function pessoas(st) { return st.pessoas || st.colaboradores || st.itens || []; }

  function renderEscala() {
    var st = stE();
    var ps = pessoas(st);
    if (!ps.length) { $("escalaBox").innerHTML = "<p class='muted'>Cadastre os colaboradores acima primeiro.</p>"; return; }
    $("escalaBox").innerHTML = "<div style='overflow-x:auto;'><table class='tabela'><thead><tr><th>Colaborador</th>" +
      DIAS.map(function (d) { return "<th>" + d + "</th>"; }).join("") + "</tr></thead><tbody>" +
      ps.map(function (p) {
        var linha = st.escala[p.id] || {};
        return "<tr><td><b>" + esc(p.nome) + "</b></td>" + DIAS.map(function (_, i) {
          return "<td><input data-esc='" + p.id + ":" + i + "' value='" + esc(linha[i] || "") + "' placeholder='—' style='width:76px;font-size:12px;padding:5px;'></td>";
        }).join("") + "</tr>";
      }).join("") + "</tbody></table></div><p class='muted' style='font-size:12px;margin-top:6px;'>Escreva o turno (ex.: 06-14, 14-22, folga). Salva sozinho ao sair do campo.</p>";
  }

  function renderPonto() {
    var st = stE();
    var hoje = S.todayISO();
    var doDia = st.ponto.filter(function (p) { return p.quando.slice(0, 10) === hoje; }).reverse();
    $("pontoSel").innerHTML = "<option value=''>— colaborador —</option>" +
      pessoas(st).map(function (p) { return "<option value='" + esc(p.nome) + "'>" + esc(p.nome) + "</option>"; }).join("");
    $("pontoLista").innerHTML = doDia.length ? doDia.map(function (p) {
      return "<div style='padding:6px 10px;border-bottom:1px solid var(--linha);font-size:13.5px;'><b>" +
        p.quando.slice(11, 16) + "</b> · " + esc(p.nome) + " · " + (p.tipo === "saida" ? "🔴 saída" : "🟢 entrada") + "</div>";
    }).join("") : "<p class='muted'>Nenhum registro hoje.</p>";
  }

  var main = document.querySelector("main");
  var card = document.createElement("div");
  card.className = "card";
  card.style.marginTop = "16px";
  card.innerHTML = "<h2>🗓 Escala da semana</h2><div id='escalaBox'></div>" +
    "<h2 style='margin-top:20px;'>⏰ Ponto do dia</h2>" +
    "<div class='linha-flex' style='gap:8px;flex-wrap:wrap;align-items:center;'>" +
    "<select id='pontoSel' style='min-width:200px;'></select>" +
    "<button class='btn mini' id='pontoEntrada'>🟢 Entrada</button>" +
    "<button class='btn sec mini' id='pontoSaida'>🔴 Saída</button></div>" +
    "<div id='pontoLista' style='margin-top:10px;'></div>";
  main.appendChild(card);

  document.addEventListener("change", function (e) {
    var alvo = e.target.closest("[data-esc]");
    if (!alvo) return;
    var partes = alvo.dataset.esc.split(":");
    var st = stE();
    st.escala[partes[0]] = st.escala[partes[0]] || {};
    st.escala[partes[0]][partes[1]] = alvo.value.trim();
    S.write("equipe", st);
  });
  function bate(tipo) {
    var nome = $("pontoSel").value;
    if (!nome) { alert("Escolha o colaborador."); return; }
    var st = stE();
    var ag = new Date();
    st.ponto.push({ nome: nome, tipo: tipo, quando: S.todayISO() + "T" + ag.toTimeString().slice(0, 5) });
    if (st.ponto.length > 2000) st.ponto = st.ponto.slice(-2000);
    S.write("equipe", st);
    renderPonto();
  }
  $("pontoEntrada").onclick = function () { bate("entrada"); };
  $("pontoSaida").onclick = function () { bate("saida"); };

  window.__escala = { renderEscala: renderEscala, renderPonto: renderPonto }; // testes
  renderEscala();
  renderPonto();
})();
</script>
</body>
</html>
