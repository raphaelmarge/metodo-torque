<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matricule-se — TORQUE FIT</title>
<link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
<link href="assets/fonts/archivo.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Archivo", system-ui, sans-serif; background: #121016; color: #f5f4f7; min-height: 100vh; }
  .topo { background: radial-gradient(120% 160% at 50% -40%, rgba(124,58,237,.35), transparent 60%), #121016; border-bottom: 1px solid #2c2739; padding: 38px 20px 28px; text-align: center; }
  .topo h1 { font-size: 26px; font-weight: 800; }
  .topo p { color: #b9b3c6; margin-top: 6px; font-size: 14.5px; }
  .corpo { max-width: 560px; margin: 0 auto; padding: 22px 16px 60px; }
  .plano { background: #1c1826; border: 2px solid #2c2739; border-radius: 14px; padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: border-color .15s ease, transform .15s ease, box-shadow .2s ease; }
  .plano:hover { transform: translateY(-1px); border-color: #4c3f6b; }
  .plano.sel { border-color: #7c3aed; background: #221b31; box-shadow: 0 8px 24px -10px rgba(124,58,237,.5); }
  .plano .nm { font-weight: 800; font-size: 16px; }
  .plano .ds { color: #b9b3c6; font-size: 12.5px; margin-top: 3px; }
  .plano .vl { font-size: 20px; font-weight: 800; color: #a78bfa; white-space: nowrap; }
  label { display: block; font-size: 12.5px; font-weight: 700; color: #b9b3c6; margin: 14px 0 5px; }
  input { width: 100%; background: #1c1826; border: 1.5px solid #2c2739; border-radius: 10px; color: #fff; padding: 13px 14px; font-family: inherit; font-size: 15px; }
  input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.2); }
  .btn { width: 100%; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none; border-radius: 12px; padding: 16px; font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: transform .15s ease, box-shadow .2s ease; }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 26px -10px rgba(124,58,237,.6); }
  .btn:disabled { opacity: .6; }
  .ok { text-align: center; padding: 40px 10px; }
  .ok .emj { font-size: 54px; }
  .ok h2 { margin: 12px 0 8px; }
  .ok p { color: #b9b3c6; font-size: 14.5px; line-height: 1.6; }
  .pix { background: #1c1826; border: 1px dashed #7c3aed; border-radius: 12px; padding: 14px; margin-top: 16px; font-size: 14px; word-break: break-all; }
  .zapbtn { display: inline-block; background: #16a34a; color: #fff; text-decoration: none; font-weight: 800; padding: 14px 22px; border-radius: 12px; margin-top: 18px; }
  .aviso { text-align: center; color: #b9b3c6; padding: 50px 20px; line-height: 1.6; }
</style>
</head>
<body>

<header class="topo">
  <h1 id="tNome">💪 Matricule-se</h1>
  <p>Escolha seu plano, deixe seu contato e garanta sua vaga — leva 1 minuto.</p>
</header>

<main class="corpo">
  <div id="carregando" class="aviso">Carregando os planos…</div>
  <div id="form" hidden>
    <div id="planos"></div>
    <label>Seu nome completo *</label>
    <input id="fNome" autocomplete="name" placeholder="Como no seu documento">
    <label>WhatsApp (DDD + número) *</label>
    <input id="fZap" inputmode="tel" autocomplete="tel" placeholder="31 99999-0000">
    <label>E-mail (opcional)</label>
    <input id="fEmail" type="email" autocomplete="email" placeholder="voce@email.com">
    <button class="btn" id="btnEnviar">Quero me matricular 🚀</button>
  </div>
  <div id="sucesso" class="ok" hidden>
    <div class="emj">🎉</div>
    <h2>Vaga reservada!</h2>
    <p>Recebemos sua matrícula, <b id="okNome"></b>! A equipe já foi avisada e vai te chamar no WhatsApp para confirmar tudo.</p>
    <div class="pix" id="pixBox" hidden></div>
    <a class="zapbtn" id="okZap" hidden target="_blank" rel="noopener">💬 Falar com a academia agora</a>
  </div>
</main>

<script src="assets/cloud-config.js"></script>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(t) { return String(t == null ? "" : t).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }
  var cfg = self.MT_CLOUD || {};
  var info = null, planoSel = null;
  var indicadoPor = "";
  try { indicadoPor = (new URLSearchParams(location.search).get("ind") || "").replace(/[^a-z0-9]/gi, "").toUpperCase().slice(0, 12); } catch (e) {}

  function rpc(fn, corpo) {
    return fetch(cfg.url + "/rest/v1/rpc/" + fn, {
      method: "POST",
      headers: { apikey: cfg.anonKey, Authorization: "Bearer " + cfg.anonKey, "Content-Type": "application/json" },
      body: JSON.stringify(corpo || {}),
    }).then(function (r) { return r.json(); });
  }

  if (!cfg.url || !cfg.anonKey) {
    $("carregando").textContent = "Página em configuração — volte em breve! 💜";
  } else {
    rpc("matricula_info", {}).then(function (d) {
      if (!d || !d.planos || !d.planos.length) {
        $("carregando").innerHTML = "A matrícula online ainda não foi ativada.<br>Chama a gente no WhatsApp que resolvemos por lá! 💜";
        return;
      }
      info = d;
      if (d.nome) { $("tNome").textContent = "💪 " + d.nome; document.title = "Matricule-se — " + d.nome; }
      $("planos").innerHTML = d.planos.map(function (p, i) {
        return '<div class="plano" data-i="' + i + '"><div><div class="nm">' + esc(p.nome) + "</div>" +
          (p.desc ? '<div class="ds">' + esc(p.desc) + "</div>" : "") + "</div>" +
          '<div class="vl">R$ ' + (+p.valor || 0).toLocaleString("pt-BR") + "<small style='font-size:11px;color:#b9b3c6'>/mês</small></div></div>";
      }).join("");
      $("carregando").hidden = true;
      $("form").hidden = false;
      if (indicadoPor) {
        var nb = document.createElement("div");
        nb.style.cssText = "background:#2a1f47;border:1px solid #7c3aed;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13.5px;";
        nb.textContent = "🤝 Você veio pela indicação de um amigo — os dois ganham quando a matrícula fechar!";
        $("form").insertBefore(nb, $("form").firstChild);
      }
      $("planos").addEventListener("click", function (e) {
        var el = e.target.closest(".plano");
        if (!el) return;
        planoSel = info.planos[+el.dataset.i];
        document.querySelectorAll(".plano").forEach(function (x) { x.classList.toggle("sel", x === el); });
      });
    }).catch(function () {
      $("carregando").textContent = "Não consegui carregar agora — tenta de novo em instantes.";
    });
  }

  $("btnEnviar").addEventListener("click", function () {
    var nome = $("fNome").value.trim();
    var zap = $("fZap").value.replace(/\D/g, "");
    if (!planoSel) { alert("Escolha um plano primeiro. 😉"); return; }
    if (nome.length < 2) { alert("Escreva seu nome completo."); $("fNome").focus(); return; }
    if (zap.length < 10) { alert("Confere o WhatsApp (DDD + número)."); $("fZap").focus(); return; }
    var btn = $("btnEnviar");
    btn.disabled = true; btn.textContent = "Enviando…";
    var corpo = { p_nome: nome, p_zap: zap, p_email: $("fEmail").value.trim(), p_plano: planoSel.nome + " (R$ " + planoSel.valor + ")" };
    if (indicadoPor) corpo.p_indicacao = indicadoPor;
    rpc("matricula_nova", corpo)
      .then(function (d) {
        if ((!d || !d.ok) && indicadoPor) { delete corpo.p_indicacao; return rpc("matricula_nova", corpo); }
        return d;
      })
      .then(function (d) {
        if (!d || !d.ok) throw new Error("erro");
        $("form").hidden = true;
        $("okNome").textContent = nome.split(" ")[0];
        if (info.pix) {
          $("pixBox").hidden = false;
          $("pixBox").innerHTML = "<b>💠 Adiantar o pagamento por Pix?</b><br>Chave: <b>" + esc(info.pix) + "</b><br><small>Valor do plano escolhido: R$ " + (+planoSel.valor || 0).toLocaleString("pt-BR") + " — mande o comprovante no WhatsApp.</small>";
        }
        if (info.zap) {
          $("okZap").hidden = false;
          $("okZap").href = "https://wa.me/55" + String(info.zap).replace(/\D/g, "") +
            "?text=" + encodeURIComponent("Oi! Acabei de fazer minha matrícula online no plano " + planoSel.nome + " — " + nome);
        }
        $("sucesso").hidden = false;
        window.scrollTo(0, 0);
      })
      .catch(function () {
        btn.disabled = false; btn.textContent = "Quero me matricular 🚀";
        alert("Não deu para enviar agora — tenta de novo ou chama no WhatsApp.");
      });
  });
})();
</script>
</body>
</html>
