name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # O publicador automático antigo ("pages build and deployment") roda em
      # paralelo em pushes na main e os dois deploys conflitam. Espera ele
      # terminar antes de publicar.
      - name: Aguardar publicador paralelo
        if: github.event_name == 'push'
        run: sleep 75
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Nova tentativa se houve conflito
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
